<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Belajar Angka!</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #e8f5e9; min-height: 100vh; font-family: 'Nunito', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { font-size: 2rem; color: #2e7d32; margin: 10px 0; }
        .subtitle { color: #1b5e20; font-size: 1rem; margin-bottom: 15px; }
        .question { font-size: 1.3rem; color: #333; margin: 10px 0; font-weight: 700; }
        .emoji-row { font-size: 3rem; margin: 10px 0; letter-spacing: 5px; animation: pop 0.4s ease; }
        @keyframes pop { 0% { transform: scale(0.8); } 100% { transform: scale(1); } }
        .choices { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-top: 15px; max-width: 300px; }
        .choice { padding: 16px; border-radius: 16px; font-size: 1.8rem; font-weight: 900; border: 3px solid #a5d6a7; background: #fff; cursor: pointer; transition: all 0.2s; text-align: center; }
        .choice:active { transform: scale(0.9); }
        .choice.correct { background: #c8e6c9; border-color: #4caf50; animation: pop 0.3s; }
        .choice.wrong { background: #ffcdd2; border-color: #f44336; }
        .btn { margin-top: 20px; padding: 14px 30px; border: none; border-radius: 50px; font-size: 1.1rem; font-weight: 700; background: #4caf50; color: #fff; font-family: inherit; cursor: pointer; }
        .btn:active { transform: scale(0.9); }
        .score { font-size: 1.1rem; color: #2e7d32; margin-top: 12px; font-weight: 700; }
        .level { font-size: 0.9rem; color: #666; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>Belajar Angka 123!</h1>
    <p class="subtitle">Hitung emoji, pilih angka yang benar!</p>
    <div class="question" id="question"></div>
    <div class="emoji-row" id="emojis"></div>
    <div class="choices" id="choices"></div>
    <div class="score" id="score"></div>
    <div class="level" id="level"></div>
    <button class="btn" id="nextBtn">Soal Baru →</button>

    <script>
    const EMOJIS = ['🍎','🌟','🐱','🐶','🦋','🌸','🐸','🍩','🎈','🐧','🍓','🐝'];
    let benar = 0, total = 0, maxNum = 5;

    function genQuestion() {
        const emoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
        const answer = 1 + Math.floor(Math.random() * maxNum);
        const row = emoji.repeat(answer);
        document.getElementById('emojis').textContent = row;
        document.getElementById('question').textContent = 'Ada berapa ' + emoji + ' ?';

        // Choices
        let choices = [answer];
        while (choices.length < (maxNum <= 5 ? 3 : 4)) {
            const r = 1 + Math.floor(Math.random() * maxNum);
            if (!choices.includes(r)) choices.push(r);
        }
        choices.sort(() => Math.random() - 0.5);

        const el = document.getElementById('choices');
        el.innerHTML = '';
        choices.forEach(c => {
            const btn = document.createElement('div');
            btn.className = 'choice';
            btn.textContent = c;
            btn.onclick = () => pick(btn, c, answer);
            el.appendChild(btn);
        });

        document.getElementById('level').textContent = 'Level: angka 1-' + maxNum;
    }

    function pick(btn, picked, correct) {
        total++;
        document.querySelectorAll('.choice').forEach(c => c.onclick = null);
        if (picked === correct) {
            btn.classList.add('correct');
            benar++;
            // Level up
            if (benar % 5 === 0 && maxNum < 10) maxNum++;
        } else {
            btn.classList.add('wrong');
            document.querySelectorAll('.choice').forEach(c => { if (parseInt(c.textContent) === correct) c.classList.add('correct'); });
        }
        document.getElementById('score').textContent = 'Benar: ' + benar + ' / ' + total;
    }

    document.getElementById('nextBtn').onclick = genQuestion;
    genQuestion();
    </script>
</body>
</html>
