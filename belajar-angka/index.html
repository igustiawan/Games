<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Belajar Angka!</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#e8f5e9;min-height:100vh;font-family:'Nunito',sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px}
        h1{font-size:1.7rem;color:#2e7d32;margin:10px 0}
        .progress-bar{width:100%;max-width:320px;height:12px;background:#a5d6a7;border-radius:10px;margin:10px 0;overflow:hidden}
        .progress-fill{height:100%;background:#2e7d32;border-radius:10px;transition:width 0.3s}
        .progress-text{font-size:0.8rem;color:#1b5e20;margin-bottom:10px}
        .question{font-size:1.2rem;color:#333;font-weight:700;margin:8px 0}
        .emoji-row{font-size:2.8rem;margin:10px 0;letter-spacing:4px;animation:pop 0.4s}
        @keyframes pop{0%{transform:scale(0.8)}100%{transform:scale(1)}}
        .choices{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px;max-width:260px}
        .choice{padding:14px;border-radius:14px;font-size:1.8rem;font-weight:900;border:3px solid #a5d6a7;background:#fff;cursor:pointer;transition:all 0.2s;text-align:center}
        .choice:active{transform:scale(0.85)}
        .choice.correct{background:#c8e6c9;border-color:#4caf50}
        .choice.wrong{background:#ffcdd2;border-color:#f44336}
        .choice.disabled{pointer-events:none;opacity:0.5}
        .next-btn{margin-top:15px;padding:12px 28px;border:none;border-radius:50px;font-size:1rem;font-weight:700;background:#4caf50;color:#fff;font-family:inherit;cursor:pointer}
        .next-btn:active{transform:scale(0.9)}
        .result{display:none;flex-direction:column;align-items:center;text-align:center;padding:30px 20px}
        .result.show{display:flex}
        .result-emoji{font-size:5rem;animation:pop 0.5s}
        .result-title{font-size:1.8rem;font-weight:900;margin:10px 0}
        .result-msg{font-size:1.1rem;color:#555;margin:5px 0 20px}
        .result-score{font-size:1.3rem;font-weight:800;color:#2e7d32;margin-bottom:5px}
        .stars{font-size:2.5rem;margin:10px 0}
        .play-again{padding:16px 35px;border:none;border-radius:50px;font-size:1.2rem;font-weight:800;background:#4caf50;color:#fff;font-family:inherit;cursor:pointer;margin-top:15px}
        .play-again:active{transform:scale(0.9)}
        .game-area{display:flex;flex-direction:column;align-items:center}
        .game-area.hide{display:none}
    </style>
</head>
<body>
    <h1>Hitung Angka 123!</h1>

    <div class="game-area" id="gameArea">
        <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
        <div class="progress-text" id="progText">Soal 1 / 10</div>
        <div class="question" id="question"></div>
        <div class="emoji-row" id="emojis"></div>
        <div class="choices" id="choices"></div>
        <button class="next-btn" id="nextBtn" style="display:none">Lanjut →</button>
    </div>

    <div class="result" id="result">
        <div class="result-emoji" id="resEmoji"></div>
        <div class="result-title" id="resTitle"></div>
        <div class="stars" id="resStars"></div>
        <div class="result-score" id="resScore"></div>
        <div class="result-msg" id="resMsg"></div>
        <button class="play-again" onclick="startGame()">Main Lagi!</button>
    </div>

    <script>
    const EMOJIS = ['🍎','🌟','🐱','🐶','🦋','🌸','🐸','🍩','🎈','🐧','🍓','🐝','🐥','🍪'];
    const TOTAL_Q = 10;
    let current, benar;

    function startGame() {
        document.getElementById('result').classList.remove('show');
        document.getElementById('gameArea').classList.remove('hide');
        benar = 0; current = 0;
        showQuestion();
    }

    function showQuestion() {
        if (current >= TOTAL_Q) { showResult(); return; }
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('progFill').style.width = (current/TOTAL_Q*100)+'%';
        document.getElementById('progText').textContent = 'Soal '+(current+1)+' / '+TOTAL_Q;

        const emoji = EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
        const answer = 1 + Math.floor(Math.random() * 7);
        document.getElementById('emojis').textContent = emoji.repeat(answer);
        document.getElementById('question').textContent = 'Ada berapa ' + emoji + ' ?';

        let choices = [answer];
        while (choices.length < 3) { const r = 1+Math.floor(Math.random()*9); if (!choices.includes(r)) choices.push(r); }
        choices.sort(() => Math.random()-0.5);

        const el = document.getElementById('choices');
        el.innerHTML = '';
        choices.forEach(c => {
            const btn = document.createElement('div');
            btn.className = 'choice';
            btn.textContent = c;
            btn.onclick = () => pick(btn, c, answer);
            el.appendChild(btn);
        });
    }

    function pick(btn, picked, correct) {
        document.querySelectorAll('.choice').forEach(c => { c.classList.add('disabled'); c.onclick = null; });
        if (picked === correct) { btn.classList.add('correct'); benar++; }
        else { btn.classList.add('wrong'); document.querySelectorAll('.choice').forEach(c => { if (parseInt(c.textContent)===correct) c.classList.add('correct'); }); }
        document.getElementById('nextBtn').style.display = 'block';
    }

    document.getElementById('nextBtn').onclick = () => { current++; showQuestion(); };

    function showResult() {
        document.getElementById('gameArea').classList.add('hide');
        document.getElementById('result').classList.add('show');
        const pct = benar/TOTAL_Q;
        let emoji,title,msg,sc;
        if(pct>=0.9){emoji='🏆';title='LUAR BIASA!';msg='Jago banget hitung!';sc=3;}
        else if(pct>=0.7){emoji='🎉';title='HEBAT!';msg='Pintar!';sc=2;}
        else if(pct>=0.5){emoji='👍';title='BAGUS!';msg='Terus latihan ya!';sc=1;}
        else{emoji='💪';title='SEMANGAT!';msg='Ayo coba lagi!';sc=0;}
        document.getElementById('resEmoji').textContent=emoji;
        document.getElementById('resTitle').textContent=title;
        document.getElementById('resScore').textContent='Benar: '+benar+' / '+TOTAL_Q;
        document.getElementById('resMsg').textContent=msg;
        document.getElementById('resStars').textContent='⭐'.repeat(sc)+'☆'.repeat(3-sc);
    }

    startGame();
    </script>
</body>
</html>
