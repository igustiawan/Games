<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hole.io</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; overflow: hidden; touch-action: none; background: #5a9e4b; }
        body { display: flex; align-items: center; justify-content: center; font-family: 'Nunito', sans-serif; min-height: 100dvh; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// ===== CONFIG =====
const MAP_W = 2000, MAP_H = 2000;
const BASE_RADIUS = 25;
const SPEED = 5;
const BOT_COUNT = 4;
const GAME_TIME = 30;

// Pastel/bright city colors like real Hole.io
const COLORS = {
    grass: '#7ec850',
    road: '#8a8a8a',
    sidewalk: '#c8c8b4',
    block: '#9ed87a',
};

const BOT_COLORS = ['#ff5252','#ffd600','#7c4dff','#00bfa5'];
const BOT_NAMES = ['Red','Gold','Purple','Teal'];

// Hole skins
const HOLE_SKINS = [
    { name: 'Hiu', rim: '#1565c0', fill: '#0d1b2a', emoji: '🦈', pattern: 'none' },
    { name: 'Naga', rim: '#ff3d00', fill: '#1a0500', emoji: '🐉', pattern: 'lava' },
    { name: 'Serigala', rim: '#78909c', fill: '#1a1a1a', emoji: '🐺', pattern: 'none' },
    { name: 'Ubur-ubur', rim: '#ea80fc', fill: '#0d001a', emoji: '🪼', pattern: 'glow' },
    { name: 'Ular', rim: '#76ff03', fill: '#001a00', emoji: '🐍', pattern: 'bubbles' },
    { name: 'Elang', rim: '#ffd600', fill: '#1a1500', emoji: '🦅', pattern: 'shine' },
    { name: 'Gurita', rim: '#00bcd4', fill: '#001a1a', emoji: '🐙', pattern: 'glow' },
    { name: 'Singa', rim: '#ff9800', fill: '#1a0e00', emoji: '🦁', pattern: 'pulse' },
];
let selectedSkin = parseInt(localStorage.getItem('holeSkin') || '0');

let state = 'menu'; // menu, skin, playing, dead
let player, bots, objects, particles;
let camera = { x: 0, y: 0 };
let highScore, timeLeft, timerInterval;
let joystick = { active: false, sx: 0, sy: 0, dx: 0, dy: 0 };
let pressedKeys = {};
let animFrame = 0;

highScore = parseInt(localStorage.getItem('holeHS3') || '0');

// ===== OBJECTS =====
function genObjects() {
    objects = [];
    // Fill city blocks with objects
    const blockSize = 200;
    for (let bx = 50; bx < MAP_W - 50; bx += blockSize) {
        for (let by = 50; by < MAP_H - 50; by += blockSize) {
            const cx = bx + 30, cy = by + 30;
            const bw = blockSize - 60, bh = blockSize - 60;
            // Fill each block with stuff
            const count = 4 + Math.floor(Math.random() * 4);
            for (let i = 0; i < count; i++) {
                const ox = cx + Math.random() * bw;
                const oy = cy + Math.random() * bh;
                const r = Math.random();
                if (r < 0.3) objects.push({ x: ox, y: oy, w: 8, h: 8, type: 'lamp', color: '#607d8b', size: 6 });
                else if (r < 0.5) objects.push({ x: ox, y: oy, w: 14, h: 14, type: 'tree', color: '#388e3c', size: 12 });
                else if (r < 0.65) objects.push({ x: ox, y: oy, w: 22, h: 12, type: 'car', color: ['#e53935','#1e88e5','#fdd835','#fff'][Math.floor(Math.random()*4)], size: 16 });
                else if (r < 0.8) objects.push({ x: ox, y: oy, w: 30, h: 30, type: 'house', color: ['#ffab91','#80cbc4','#ce93d8','#fff59d'][Math.floor(Math.random()*4)], size: 28 });
                else if (r < 0.92) objects.push({ x: ox, y: oy, w: 40, h: 40, type: 'building', color: ['#90a4ae','#b0bec5','#78909c'][Math.floor(Math.random()*3)], size: 38 });
                else objects.push({ x: ox, y: oy, w: 50, h: 60, type: 'tower', color: '#546e7a', size: 50 });
            }
        }
    }
}

// ===== INIT =====
function createHole(x, y, color, isPlayer, name) {
    return { x, y, radius: BASE_RADIUS, color, isPlayer, eaten: 0, name };
}

function initGame() {
    player = createHole(MAP_W/2, MAP_H/2, '#1a1a1a', true, 'Kamu');
    bots = [];
    for (let i = 0; i < BOT_COUNT; i++) {
        bots.push(createHole(200+Math.random()*(MAP_W-400), 200+Math.random()*(MAP_H-400), BOT_COLORS[i], false, BOT_NAMES[i]));
    }
    genObjects();
    particles = [];
    timeLeft = GAME_TIME;
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => { if (state==='playing') { timeLeft--; if (timeLeft<=0) endGame(); } }, 1000);
    state = 'playing';
}

function endGame() {
    clearInterval(timerInterval); state = 'dead';
    if (player.eaten > highScore) { highScore = player.eaten; localStorage.setItem('holeHS3', highScore); }
}

// ===== PHYSICS =====
function moveHole(hole, mx, my) {
    hole.x += mx * SPEED;
    hole.y += my * SPEED;
    hole.x = Math.max(hole.radius, Math.min(MAP_W - hole.radius, hole.x));
    hole.y = Math.max(hole.radius, Math.min(MAP_H - hole.radius, hole.y));
}

function eatCheck(hole) {
    for (let i = objects.length - 1; i >= 0; i--) {
        const o = objects[i];
        if (o.falling) continue;
        if (o.size > hole.radius) continue; // Can eat anything smaller than radius
        const d = Math.hypot(o.x - hole.x, o.y - hole.y);
        if (d < hole.radius) { // Eat when object center is inside hole
            o.falling = true;
            o.fallT = 0;
            hole.eaten++;
            hole.radius += 0.3 + o.size * 0.015;
            // Eat effect!
            spawnEatEffect(o.x, o.y, o.color, 6);
            if (hole.isPlayer && navigator.vibrate) navigator.vibrate(15);
        }
    }
}

function spawnEatEffect(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push({ x, y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8-2, life: 1, color, size: 3+Math.random()*5 });
    }
}

function updateBot(bot) {
    let tx = bot.x + (Math.random()-0.5)*50, ty = bot.y + (Math.random()-0.5)*50;
    let best = 500;
    // Find nearest eatable object
    objects.forEach(o => {
        if (o.falling || o.size > bot.radius) return;
        const d = Math.hypot(o.x-bot.x, o.y-bot.y);
        if (d < best) { best = d; tx = o.x; ty = o.y; }
    });
    // Hunt smaller holes
    [player, ...bots].forEach(h => {
        if (h===bot || h.radius >= bot.radius*0.8) return;
        const d = Math.hypot(h.x-bot.x, h.y-bot.y);
        if (d < 250 && bot.radius > h.radius*1.5) { tx = h.x; ty = h.y; }
    });
    // Flee bigger holes
    [player, ...bots].forEach(h => {
        if (h===bot) return;
        if (h.radius > bot.radius*1.4) {
            const d = Math.hypot(h.x-bot.x, h.y-bot.y);
            if (d < 200) { tx = bot.x*2-h.x; ty = bot.y*2-h.y; }
        }
    });
    const dx = tx-bot.x, dy = ty-bot.y;
    const len = Math.hypot(dx, dy)||1;
    // Direct movement (no lerp reduction for bots)
    bot.x += (dx/len) * SPEED * 0.75;
    bot.y += (dy/len) * SPEED * 0.75;
    bot.x = Math.max(bot.radius, Math.min(MAP_W-bot.radius, bot.x));
    bot.y = Math.max(bot.radius, Math.min(MAP_H-bot.radius, bot.y));
    eatCheck(bot);
}

// ===== UPDATE =====
function update() {
    animFrame++;
    // Player input
    let mx = 0, my = 0;
    if (pressedKeys['w']||pressedKeys['W']||pressedKeys['ArrowUp']) my = -1;
    if (pressedKeys['s']||pressedKeys['S']||pressedKeys['ArrowDown']) my = 1;
    if (pressedKeys['a']||pressedKeys['A']||pressedKeys['ArrowLeft']) mx = -1;
    if (pressedKeys['d']||pressedKeys['D']||pressedKeys['ArrowRight']) mx = 1;
    if (joystick.active) {
        const len = Math.hypot(joystick.dx, joystick.dy);
        if (len > 12) { mx = joystick.dx/len; my = joystick.dy/len; }
    }
    if (mx||my) { const len = Math.hypot(mx,my); moveHole(player, mx/len, my/len); }
    eatCheck(player);
    bots.forEach(b => updateBot(b));

    // Hole eats hole (bigger eats smaller)
    const allHoles = [player, ...bots];
    for (let i = 0; i < allHoles.length; i++) {
        for (let j = i+1; j < allHoles.length; j++) {
            const a = allHoles[i], b = allHoles[j];
            const d = Math.hypot(a.x-b.x, a.y-b.y);
            if (d < Math.max(a.radius, b.radius) * 0.6) {
                if (a.radius > b.radius * 1.4) {
                    // a eats b
                    a.radius += b.radius * 0.3; a.eaten += b.eaten + 3;
                    spawnEatEffect(b.x, b.y, b.color || '#ff5252', 15);
                    b.x = 100+Math.random()*(MAP_W-200); b.y = 100+Math.random()*(MAP_H-200); b.radius = BASE_RADIUS; b.eaten = 0;
                    if (b.isPlayer) endGame();
                } else if (b.radius > a.radius * 1.4) {
                    // b eats a
                    b.radius += a.radius * 0.3; b.eaten += a.eaten + 3;
                    spawnEatEffect(a.x, a.y, a.color || '#ff5252', 15);
                    a.x = 100+Math.random()*(MAP_W-200); a.y = 100+Math.random()*(MAP_H-200); a.radius = BASE_RADIUS; a.eaten = 0;
                    if (a.isPlayer) endGame();
                }
            }
        }
    }

    // Falling objects
    for (let i = objects.length-1; i >= 0; i--) {
        const o = objects[i];
        if (!o.falling) continue;
        o.fallT += 0.06;
        if (o.fallT >= 1) objects.splice(i, 1);
    }

    // Camera
    camera.x = player.x - W/2;
    camera.y = player.y - H/2;
    draw();
}

// ===== DRAW =====
function draw() {
    // Green background
    ctx.fillStyle = COLORS.grass;
    ctx.fillRect(0, 0, W, H);
    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    // Draw city blocks (grass squares with sidewalk border)
    const bs = 200;
    for (let bx = 0; bx < MAP_W; bx += bs) {
        for (let by = 0; by < MAP_H; by += bs) {
            // Sidewalk
            ctx.fillStyle = COLORS.sidewalk;
            ctx.fillRect(bx + 15, by + 15, bs - 30, bs - 30);
            // Green center
            ctx.fillStyle = COLORS.block;
            ctx.fillRect(bx + 22, by + 22, bs - 44, bs - 44);
        }
    }

    // Roads (between blocks)
    ctx.fillStyle = COLORS.road;
    for (let x = bs - 15; x < MAP_W; x += bs) ctx.fillRect(x, 0, 30, MAP_H);
    for (let y = bs - 15; y < MAP_H; y += bs) ctx.fillRect(0, y, MAP_W, 30);
    // Road markings
    ctx.fillStyle = '#bbb';
    for (let x = bs; x < MAP_W; x += bs) for (let y = 0; y < MAP_H; y += 30) ctx.fillRect(x-2, y, 4, 18);
    for (let y = bs; y < MAP_H; y += bs) for (let x = 0; x < MAP_W; x += 30) ctx.fillRect(x, y-2, 18, 4);

    // Objects (not falling)
    objects.filter(o => !o.falling).forEach(o => drawObj(o));

    // Falling objects (shrinking into hole)
    objects.filter(o => o.falling).forEach(o => {
        const scale = 1 - o.fallT;
        ctx.save();
        ctx.translate(o.x, o.y);
        ctx.scale(scale, scale);
        ctx.translate(-o.x, -o.y);
        ctx.globalAlpha = scale;
        drawObj(o);
        ctx.restore();
        ctx.globalAlpha = 1;
    });

    // Holes (bots then player)
    bots.forEach(b => drawHole(b));
    drawHole(player);

    ctx.restore();
    drawHUD();
    if (state==='menu') drawMenu();
    if (state==='skin') drawSkinMenu();
    if (state==='dead') drawEnd();
}

function drawHole(h) {
    const skin = h.isPlayer ? HOLE_SKINS[selectedSkin] : { rim: h.color, fill: '#111', pattern: 'none', emoji: ['🔴','🟡','🟣','🟢'][bots.indexOf(h)] || '⚫' };
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.arc(h.x+2, h.y+3, h.radius, 0, Math.PI*2); ctx.fill();
    // Main hole
    ctx.fillStyle = skin.fill;
    ctx.beginPath(); ctx.arc(h.x, h.y, h.radius, 0, Math.PI*2); ctx.fill();
    // Pattern
    if (skin.pattern === 'glow') {
        ctx.strokeStyle = skin.rim+'60'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(h.x, h.y, h.radius*0.6, animFrame*0.04, animFrame*0.04+Math.PI*1.2); ctx.stroke();
    } else if (skin.pattern === 'lava') {
        ctx.fillStyle = '#ff6d0030';
        ctx.beginPath(); ctx.arc(h.x+Math.sin(animFrame*0.05)*5, h.y+Math.cos(animFrame*0.05)*5, h.radius*0.4, 0, Math.PI*2); ctx.fill();
    } else if (skin.pattern === 'bubbles') {
        ctx.fillStyle = skin.rim+'30';
        for (let i=0;i<3;i++) { const a=animFrame*0.03+i*2; ctx.beginPath(); ctx.arc(h.x+Math.cos(a)*h.radius*0.3, h.y+Math.sin(a)*h.radius*0.3, 4+i*2, 0, Math.PI*2); ctx.fill(); }
    } else if (skin.pattern === 'pulse') {
        const pulse = 0.8+Math.sin(animFrame*0.08)*0.2;
        ctx.strokeStyle = skin.rim+'40'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(h.x, h.y, h.radius*pulse, 0, Math.PI*2); ctx.stroke();
    } else if (skin.pattern === 'shine') {
        ctx.fillStyle = skin.rim+'20';
        ctx.beginPath(); ctx.arc(h.x-h.radius*0.2, h.y-h.radius*0.2, h.radius*0.3, 0, Math.PI*2); ctx.fill();
    }
    // Rim
    ctx.strokeStyle = skin.rim; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(h.x, h.y, h.radius, 0, Math.PI*2); ctx.stroke();
    // Animal emoji inside hole
    const emojiSize = Math.max(16, Math.floor(h.radius * 0.7));
    ctx.font = emojiSize + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(skin.emoji, h.x, h.y + 2);
    // Name
    ctx.fillStyle = h.isPlayer ? '#fff' : h.color;
    ctx.font = 'bold 12px Nunito'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(h.name, h.x, h.y - h.radius - 10);
}

function drawObj(o) {
    const x = o.x, y = o.y;
    if (o.type === 'lamp') {
        ctx.fillStyle = '#78909c';
        ctx.fillRect(x-1.5, y-8, 3, 10);
        ctx.fillStyle = '#fff9c4';
        ctx.beginPath(); ctx.arc(x, y-8, 4, 0, Math.PI*2); ctx.fill();
    } else if (o.type === 'tree') {
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.beginPath(); ctx.ellipse(x, y+8, 10, 5, 0, 0, Math.PI*2); ctx.fill();
        // Trunk
        ctx.fillStyle = '#6d4c41';
        ctx.fillRect(x-3, y-2, 6, 14);
        // Foliage (circle)
        ctx.fillStyle = o.color;
        ctx.beginPath(); ctx.arc(x, y-8, 12, 0, Math.PI*2); ctx.fill();
    } else if (o.type === 'car') {
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.beginPath(); ctx.ellipse(x, y+6, 12, 5, 0, 0, Math.PI*2); ctx.fill();
        // Body
        ctx.fillStyle = o.color;
        ctx.beginPath(); ctx.roundRect(x-11, y-5, 22, 12, 4); ctx.fill();
        // Top
        ctx.fillStyle = o.color === '#fff' ? '#e0e0e0' : o.color;
        ctx.beginPath(); ctx.roundRect(x-7, y-9, 14, 7, 3); ctx.fill();
        // Windows
        ctx.fillStyle = 'rgba(100,200,255,0.5)';
        ctx.fillRect(x-5, y-8, 5, 5);
        ctx.fillRect(x+1, y-8, 5, 5);
    } else if (o.type === 'house') {
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.08)';
        ctx.fillRect(x-13, y+10, 28, 6);
        // Walls
        ctx.fillStyle = o.color;
        ctx.fillRect(x-13, y-10, 26, 22);
        // Roof
        ctx.fillStyle = '#d84315';
        ctx.beginPath(); ctx.moveTo(x-16, y-10); ctx.lineTo(x, y-22); ctx.lineTo(x+16, y-10); ctx.fill();
        // Door
        ctx.fillStyle = '#5d4037';
        ctx.beginPath(); ctx.roundRect(x-4, y+2, 8, 10, 2); ctx.fill();
        // Window
        ctx.fillStyle = '#bbdefb';
        ctx.fillRect(x+5, y-5, 6, 6);
        ctx.fillRect(x-12, y-5, 6, 6);
    } else if (o.type === 'building') {
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.fillRect(x-16, y+15, 34, 6);
        // Main
        ctx.fillStyle = o.color;
        ctx.fillRect(x-16, y-25, 32, 42);
        // Windows
        ctx.fillStyle = '#fff9c4';
        for (let wy = 0; wy < 4; wy++) for (let wx = 0; wx < 3; wx++) {
            ctx.fillRect(x-12+wx*10, y-20+wy*10, 6, 6);
        }
    } else if (o.type === 'tower') {
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.fillRect(x-14, y+22, 30, 8);
        // Main
        ctx.fillStyle = o.color;
        ctx.fillRect(x-14, y-40, 28, 65);
        // Top section (lighter)
        ctx.fillStyle = '#78909c';
        ctx.fillRect(x-10, y-48, 20, 12);
        // Antenna
        ctx.fillStyle = '#455a64';
        ctx.fillRect(x-1, y-56, 3, 10);
        ctx.fillStyle = '#f44336';
        ctx.beginPath(); ctx.arc(x, y-56, 3, 0, Math.PI*2); ctx.fill();
        // Windows
        ctx.fillStyle = 'rgba(255,255,200,0.4)';
        for (let wy = 0; wy < 6; wy++) for (let wx = 0; wx < 2; wx++) {
            ctx.fillRect(x-8+wx*12, y-35+wy*10, 7, 6);
        }
    }
}




function drawHUD() {
    // Timer (top center)
    ctx.fillStyle = '#fff'; ctx.strokeStyle = '#333'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(W/2, 32, 24, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = timeLeft<=10 ? '#e53935' : '#333'; ctx.font = 'bold 16px Nunito'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(timeLeft, W/2, 32);
    // Score (top left)
    ctx.fillStyle = '#fff'; ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(12, 12, 90, 34, 17); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#333'; ctx.font = 'bold 13px Nunito'; ctx.textAlign = 'left';
    ctx.fillText(player.eaten + ' eaten', 24, 30);
    // Ranking (top right)
    const all = [player,...bots].sort((a,b)=>b.eaten-a.eaten);
    const rank = all.findIndex(h=>h.isPlayer)+1;
    ctx.fillStyle = '#fff'; ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(W-100, 12, 88, 34, 17); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#333'; ctx.font = 'bold 13px Nunito'; ctx.textAlign = 'right';
    ctx.fillText('#'+rank+' / '+(BOT_COUNT+1), W-20, 30);
    // Joystick
    if (joystick.active) {
        ctx.globalAlpha = 0.3; ctx.fillStyle = '#333';
        ctx.beginPath(); ctx.arc(joystick.sx, joystick.sy, 50, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#555';
        ctx.beginPath(); ctx.arc(joystick.sx+joystick.dx*0.4, joystick.sy+joystick.dy*0.4, 22, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
    }
}

function drawMenu() {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 48px Nunito'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('HOLE.IO', W/2, H/2-110);
    ctx.fillStyle = '#ddd'; ctx.font = '15px Nunito';
    ctx.fillText('Gerakin lobang, makan seisi kota!', W/2, H/2-65);
    // Skin preview
    ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.beginPath(); ctx.roundRect(W/2-60, H/2-50, 120, 28, 14); ctx.fill();
    ctx.fillStyle = HOLE_SKINS[selectedSkin].rim; ctx.font = 'bold 12px Nunito';
    ctx.fillText('Skin: '+HOLE_SKINS[selectedSkin].name, W/2, H/2-36);
    // Start button
    ctx.fillStyle = '#4caf50';
    ctx.beginPath(); ctx.roundRect(W/2-90, H/2-8, 180, 50, 25); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 22px Nunito'; ctx.fillText('MAIN!', W/2, H/2+17);
    // Skin button
    ctx.fillStyle = '#7c4dff';
    ctx.beginPath(); ctx.roundRect(W/2-90, H/2+52, 180, 42, 21); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 16px Nunito'; ctx.fillText('PILIH SKIN', W/2, H/2+73);
    // Controls
    ctx.fillStyle = '#aaa'; ctx.font = '11px Nunito';
    ctx.fillText('WASD / Arrow / Joystick', W/2, H/2+115);
    if (highScore > 0) { ctx.fillStyle = '#ffd600'; ctx.font = 'bold 13px Nunito'; ctx.fillText('Best: '+highScore, W/2, H/2+135); }
}

function drawSkinMenu() {
    ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 28px Nunito'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('PILIH SKIN', W/2, 45);

    const cols = Math.min(4, Math.floor((W-20)/120));
    const cw = 100, ch = 90;
    const startX = W/2 - (cols*cw + (cols-1)*10)/2;
    const startY = 80;

    HOLE_SKINS.forEach((skin, i) => {
        const col = i % cols, row = Math.floor(i / cols);
        const cx = startX + col * (cw+10) + cw/2;
        const cy = startY + row * (ch+10) + ch/2;
        const sel = i === selectedSkin;
        // Card bg
        ctx.fillStyle = sel ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.04)';
        ctx.strokeStyle = sel ? skin.rim : 'rgba(255,255,255,0.1)'; ctx.lineWidth = sel ? 2 : 1;
        ctx.beginPath(); ctx.roundRect(cx-cw/2, cy-ch/2, cw, ch, 12); ctx.fill(); ctx.stroke();
        // Hole preview
        ctx.fillStyle = skin.fill;
        ctx.beginPath(); ctx.arc(cx, cy-10, 20, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = skin.rim; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(cx, cy-10, 20, 0, Math.PI*2); ctx.stroke();
        // Name
        ctx.fillStyle = sel ? skin.rim : '#aaa'; ctx.font = 'bold 10px Nunito';
        ctx.fillText(skin.name, cx, cy+30);
        if (sel) { ctx.fillStyle = '#fff'; ctx.font = '9px Nunito'; ctx.fillText('TERPILIH', cx, cy+42); }
    });

    // OKE button
    const rows = Math.ceil(HOLE_SKINS.length / cols);
    const btnY = startY + rows * (ch+10) + 10;
    ctx.fillStyle = '#4caf50';
    ctx.beginPath(); ctx.roundRect(W/2-80, btnY, 160, 42, 21); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 18px Nunito'; ctx.fillText('OKE!', W/2, btnY+21);
}

function drawEnd() {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
    const all = [player,...bots].sort((a,b)=>b.eaten-a.eaten);
    const rank = all.findIndex(h=>h.isPlayer)+1;
    ctx.fillStyle = rank===1 ? '#ffd600' : '#fff'; ctx.font = 'bold 42px Nunito'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(rank===1 ? 'JUARA 1!' : '#'+rank, W/2, H/2-70);
    ctx.fillStyle = '#fff'; ctx.font = '18px Nunito';
    ctx.fillText('Dimakan: '+player.eaten, W/2, H/2-25);
    if (player.eaten >= highScore && player.eaten>0) { ctx.fillStyle = '#ffd600'; ctx.font = 'bold 14px Nunito'; ctx.fillText('REKOR BARU!', W/2, H/2); }
    ctx.fillStyle = '#4caf50';
    ctx.beginPath(); ctx.roundRect(W/2-90, H/2+20, 180, 48, 24); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 18px Nunito'; ctx.fillText('MAIN LAGI', W/2, H/2+44);
    // Full leaderboard
    ctx.font = '14px Nunito';
    all.forEach((h, i) => {
        ctx.fillStyle = h.isPlayer ? '#ffd600' : '#aaa';
        ctx.fillText((i+1)+'. '+h.name+' — '+h.eaten+' eaten', W/2, H/2+85+i*22);
    });
}

// ===== INPUT =====
document.addEventListener('keydown', e => { pressedKeys[e.key] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { pressedKeys[e.key] = false; });

canvas.addEventListener('touchstart', e => {
    const t = e.touches[0];
    if (state==='menu') {
        if (t.clientX>W/2-90&&t.clientX<W/2+90&&t.clientY>H/2-8&&t.clientY<H/2+42) initGame();
        else if (t.clientX>W/2-90&&t.clientX<W/2+90&&t.clientY>H/2+52&&t.clientY<H/2+94) state='skin';
    } else if (state==='skin') { handleSkinClick(t.clientX, t.clientY); }
    else if (state==='dead') { if (t.clientX>W/2-90&&t.clientX<W/2+90&&t.clientY>H/2+20&&t.clientY<H/2+68) initGame(); }
    else { joystick.active=true; joystick.sx=t.clientX; joystick.sy=t.clientY; joystick.dx=0; joystick.dy=0; }
    e.preventDefault();
}, {passive:false});
canvas.addEventListener('touchmove', e => { const t=e.touches[0]; if(joystick.active){joystick.dx=t.clientX-joystick.sx; joystick.dy=t.clientY-joystick.sy;} e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchend', e => { joystick.active=false; joystick.dx=0; joystick.dy=0; e.preventDefault(); }, {passive:false});
canvas.addEventListener('click', e => {
    if (state==='menu') {
        if(e.clientX>W/2-90&&e.clientX<W/2+90&&e.clientY>H/2-8&&e.clientY<H/2+42) initGame();
        else if(e.clientX>W/2-90&&e.clientX<W/2+90&&e.clientY>H/2+52&&e.clientY<H/2+94) state='skin';
    }
    if (state==='skin') handleSkinClick(e.clientX, e.clientY);
    if (state==='dead') { if(e.clientX>W/2-90&&e.clientX<W/2+90&&e.clientY>H/2+20&&e.clientY<H/2+68) initGame(); }
});

function handleSkinClick(mx, my) {
    const cols = Math.min(4, Math.floor((W-20)/120));
    const cw = 100, ch = 90;
    const startX = W/2 - (cols*cw + (cols-1)*10)/2;
    const startY = 80;
    HOLE_SKINS.forEach((skin, i) => {
        const col = i % cols, row = Math.floor(i / cols);
        const cx = startX + col*(cw+10) + cw/2;
        const cy = startY + row*(ch+10) + ch/2;
        if (mx > cx-cw/2 && mx < cx+cw/2 && my > cy-ch/2 && my < cy+ch/2) {
            selectedSkin = i; localStorage.setItem('holeSkin', i);
        }
    });
    // OKE button
    const rows = Math.ceil(HOLE_SKINS.length / cols);
    const btnY = startY + rows*(ch+10) + 10;
    if (mx > W/2-80 && mx < W/2+80 && my > btnY && my < btnY+42) state = 'menu';
}

// ===== START =====
function gameLoop() { requestAnimationFrame(gameLoop); if (state==='playing') update(); else { animFrame++; draw(); } }
state = 'menu';
player = createHole(MAP_W/2, MAP_H/2, '#1a1a1a', true, 'Kamu');
bots = []; objects = []; particles = [];
requestAnimationFrame(gameLoop);
</script>
