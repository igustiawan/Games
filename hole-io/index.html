<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hole.io - Lobang Rakus!</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; overflow: hidden; touch-action: none; background: #1a1a2e; }
        body { display: flex; align-items: center; justify-content: center; font-family: 'Nunito', sans-serif; min-height: 100dvh; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// ===== CONFIG =====
const MAP_W = 2500, MAP_H = 2500;
const BASE_RADIUS = 28;
const PLAYER_SPEED = 3.5;
const BOT_COUNT = 4;
const GAME_TIME = 90;

const HOLE_COLORS = [
    { dark: '#0d0d2b', rim: '#00e5ff', light: '#004d5e' },
    { dark: '#1a0505', rim: '#ff5252', light: '#5e0000' },
    { dark: '#051a05', rim: '#69f0ae', light: '#005e1a' },
    { dark: '#1a1a05', rim: '#ffd740', light: '#5e5e00' },
    { dark: '#0d051a', rim: '#ea80fc', light: '#3d005e' },
];
const BOT_NAMES = ['Red', 'Green', 'Gold', 'Purple'];

let state = 'menu';
let player, bots, objects, particles;
let camera = { x: 0, y: 0 };
let highScore, timeLeft, timerInterval;
let joystick = { active: false, startX: 0, startY: 0, dx: 0, dy: 0, id: -1 };
let pressedKeys = {};
let animFrame = 0;

highScore = parseInt(localStorage.getItem('holeHS2') || '0');

// ===== OBJECTS =====
function generateObjects() {
    objects = [];
    // Small items (easily eaten)
    for (let i = 0; i < 120; i++) objects.push(makeObj('lamp', 6+Math.random()*4, '#78909c'));
    for (let i = 0; i < 80; i++) objects.push(makeObj('bush', 10+Math.random()*5, '#66bb6a'));
    for (let i = 0; i < 50; i++) objects.push(makeObj('bench', 12+Math.random()*4, '#8d6e63'));
    // Medium
    for (let i = 0; i < 35; i++) objects.push(makeObj('car', 18+Math.random()*8, '#42a5f5'));
    for (let i = 0; i < 30; i++) objects.push(makeObj('tree', 20+Math.random()*10, '#388e3c'));
    // Large
    for (let i = 0; i < 20; i++) objects.push(makeObj('house', 35+Math.random()*15, '#ffb74d'));
    for (let i = 0; i < 12; i++) objects.push(makeObj('building', 50+Math.random()*20, '#ab47bc'));
    for (let i = 0; i < 6; i++) objects.push(makeObj('tower', 75+Math.random()*15, '#ec407a'));
}

function makeObj(type, size, color) {
    return { x: 60+Math.random()*(MAP_W-120), y: 60+Math.random()*(MAP_H-120), size, type, color, falling: false, fallProgress: 0 };
}

// ===== HOLE =====
function createHole(x, y, colorIdx, isPlayer, name) {
    return { x, y, radius: BASE_RADIUS, colorIdx, isPlayer, eaten: 0, name, targetX: x, targetY: y };
}

// ===== INIT =====
function initGame() {
    player = createHole(MAP_W/2, MAP_H/2, 0, true, 'Kamu');
    bots = [];
    for (let i = 0; i < BOT_COUNT; i++) {
        bots.push(createHole(200+Math.random()*(MAP_W-400), 200+Math.random()*(MAP_H-400), i+1, false, BOT_NAMES[i]));
    }
    generateObjects();
    particles = [];
    timeLeft = GAME_TIME;
    animFrame = 0;
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => { if (state==='playing') { timeLeft--; if (timeLeft<=0) endGame(); } }, 1000);
    state = 'playing';
}

function endGame() {
    clearInterval(timerInterval); state = 'dead';
    const sc = player.eaten;
    if (sc > highScore) { highScore = sc; localStorage.setItem('holeHS2', highScore); }
}

// ===== AI =====
function updateBot(bot) {
    // Find nearest eatable
    let tx = bot.x, ty = bot.y, bestD = 600;
    objects.forEach(o => {
        if (o.falling || o.size > bot.radius * 0.7) return;
        const d = Math.hypot(o.x-bot.x, o.y-bot.y);
        if (d < bestD) { bestD = d; tx = o.x; ty = o.y; }
    });
    // Avoid bigger holes
    [player, ...bots].forEach(h => {
        if (h===bot) return;
        if (h.radius > bot.radius*1.3) {
            const d = Math.hypot(h.x-bot.x, h.y-bot.y);
            if (d < 200) { tx = bot.x-(h.x-bot.x); ty = bot.y-(h.y-bot.y); }
        }
    });
    // Move towards target (smooth)
    const dx = tx-bot.x, dy = ty-bot.y;
    const len = Math.hypot(dx, dy)||1;
    bot.x += (dx/len) * PLAYER_SPEED * 0.8;
    bot.y += (dy/len) * PLAYER_SPEED * 0.8;
    bot.x = Math.max(bot.radius, Math.min(MAP_W-bot.radius, bot.x));
    bot.y = Math.max(bot.radius, Math.min(MAP_H-bot.radius, bot.y));
    eatObjects(bot);
}

// ===== EAT =====
function eatObjects(hole) {
    for (let i = objects.length-1; i >= 0; i--) {
        const o = objects[i];
        if (o.falling) continue;
        if (o.size > hole.radius * 0.7) continue; // Must be smaller
        const d = Math.hypot(o.x-hole.x, o.y-hole.y);
        if (d < hole.radius * 0.6) {
            o.falling = true;
            o.holeX = hole.x; o.holeY = hole.y;
            hole.eaten++;
            hole.radius += 0.3 + o.size * 0.02;
            for (let j=0;j<4;j++) particles.push({x:o.x,y:o.y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:1,color:o.color,size:3+Math.random()*3});
        }
    }
}

// ===== UPDATE =====
function update() {
    if (state !== 'playing') return;
    animFrame++;

    // Player movement (WASD / joystick only — NO mouse follow)
    let mx = 0, my = 0;
    if (pressedKeys['w']||pressedKeys['W']||pressedKeys['ArrowUp']) my = -1;
    if (pressedKeys['s']||pressedKeys['S']||pressedKeys['ArrowDown']) my = 1;
    if (pressedKeys['a']||pressedKeys['A']||pressedKeys['ArrowLeft']) mx = -1;
    if (pressedKeys['d']||pressedKeys['D']||pressedKeys['ArrowRight']) mx = 1;
    if (joystick.active) {
        const len = Math.hypot(joystick.dx, joystick.dy);
        if (len > 12) { mx = joystick.dx/len; my = joystick.dy/len; }
    }
    if (mx||my) {
        const len = Math.hypot(mx,my);
        player.x += (mx/len)*PLAYER_SPEED;
        player.y += (my/len)*PLAYER_SPEED;
    }
    player.x = Math.max(player.radius, Math.min(MAP_W-player.radius, player.x));
    player.y = Math.max(player.radius, Math.min(MAP_H-player.radius, player.y));

    eatObjects(player);
    bots.forEach(b => updateBot(b));

    // Falling objects
    for (let i=objects.length-1;i>=0;i--) {
        const o=objects[i];
        if (!o.falling) continue;
        o.fallProgress += 0.04;
        if (o.fallProgress >= 1) objects.splice(i,1);
    }

    // Particles
    for (let i=particles.length-1;i>=0;i--) { const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.life-=0.03; if(p.life<=0) particles.splice(i,1); }

    camera.x = player.x - W/2;
    camera.y = player.y - H/2;
    draw();
}

// ===== DRAW =====
function draw() {
    // Light city background
    ctx.fillStyle = '#f5f0e8'; ctx.fillRect(0,0,W,H);
    ctx.save(); ctx.translate(-camera.x, -camera.y);

    // Roads
    ctx.fillStyle = '#e0ddd5';
    for (let x=0; x<MAP_W; x+=250) ctx.fillRect(x-12,0,24,MAP_H);
    for (let y=0; y<MAP_H; y+=250) ctx.fillRect(0,y-12,MAP_W,24);
    // Road lines
    ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1; ctx.setLineDash([12,8]);
    for (let x=0; x<MAP_W; x+=250) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,MAP_H); ctx.stroke(); }
    for (let y=0; y<MAP_H; y+=250) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(MAP_W,y); ctx.stroke(); }
    ctx.setLineDash([]);

    // Grass patches
    ctx.fillStyle = '#d4e6c3';
    for (let x=125;x<MAP_W;x+=250) for (let y=125;y<MAP_H;y+=250) {
        ctx.beginPath(); ctx.roundRect(x-100,y-100,200,200,12); ctx.fill();
    }

    // Objects (sorted by size for depth)
    objects.filter(o=>!o.falling).sort((a,b)=>a.size-b.size).forEach(o=>drawObj(o));
    // Falling (shrinking)
    objects.filter(o=>o.falling).forEach(o => {
        const scale = 1-o.fallProgress;
        ctx.globalAlpha = scale;
        ctx.save();
        ctx.translate(o.x, o.y);
        ctx.scale(scale, scale);
        ctx.translate(-o.x, -o.y);
        drawObj(o);
        ctx.restore();
        ctx.globalAlpha = 1;
    });

    // Holes (bots first, player on top)
    bots.forEach(b => drawHole(b));
    drawHole(player);

    // Particles
    particles.forEach(p => { ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill(); });
    ctx.globalAlpha=1;

    ctx.restore();
    drawHUD();
    if (state==='menu') drawMenu();
    if (state==='dead') drawEnd();
}

function drawHole(h) {
    const c = HOLE_COLORS[h.colorIdx];
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath(); ctx.ellipse(h.x+3,h.y+4,h.radius,h.radius*0.8,0,0,Math.PI*2); ctx.fill();
    // Main hole
    const g = ctx.createRadialGradient(h.x,h.y,0,h.x,h.y,h.radius);
    g.addColorStop(0, c.dark);
    g.addColorStop(0.7, c.light);
    g.addColorStop(1, c.rim+'60');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.ellipse(h.x,h.y,h.radius,h.radius*0.8,0,0,Math.PI*2); ctx.fill();
    // Rim
    ctx.strokeStyle = c.rim; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.ellipse(h.x,h.y,h.radius,h.radius*0.8,0,0,Math.PI*2); ctx.stroke();
    // Spiral
    ctx.strokeStyle = c.rim+'30'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(h.x,h.y,h.radius*0.4,animFrame*0.04,animFrame*0.04+Math.PI*1.3); ctx.stroke();
    // Name
    ctx.fillStyle = c.rim; ctx.font = 'bold 11px Nunito'; ctx.textAlign = 'center';
    ctx.fillText(h.name, h.x, h.y-h.radius*0.8-10);
}

function drawObj(o) {
    const x=o.x, y=o.y, s=o.size;
    if (o.type==='lamp') {
        ctx.fillStyle = '#9e9e9e'; ctx.fillRect(x-2,y-s,4,s);
        ctx.fillStyle = '#ffd600'; ctx.beginPath(); ctx.arc(x,y-s,4,0,Math.PI*2); ctx.fill();
    } else if (o.type==='bush') {
        ctx.fillStyle = o.color;
        ctx.beginPath(); ctx.ellipse(x,y,s*0.6,s*0.5,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = '#81c784';
        ctx.beginPath(); ctx.ellipse(x-s*0.2,y-s*0.15,s*0.3,s*0.25,0,0,Math.PI*2); ctx.fill();
    } else if (o.type==='bench') {
        ctx.fillStyle = '#6d4c41'; ctx.beginPath(); ctx.roundRect(x-s*0.5,y-s*0.2,s,s*0.4,3); ctx.fill();
        ctx.fillStyle = '#5d4037'; ctx.fillRect(x-s*0.4,y+s*0.1,4,s*0.3); ctx.fillRect(x+s*0.3,y+s*0.1,4,s*0.3);
    } else if (o.type==='car') {
        // Smooth rounded car
        ctx.fillStyle = o.color;
        ctx.beginPath(); ctx.roundRect(x-s*0.5,y-s*0.25,s,s*0.5,s*0.15); ctx.fill();
        ctx.fillStyle = '#1565c0';
        ctx.beginPath(); ctx.roundRect(x-s*0.3,y-s*0.2,s*0.6,s*0.35,s*0.1); ctx.fill();
        // Windows
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.beginPath(); ctx.roundRect(x-s*0.2,y-s*0.15,s*0.18,s*0.22,3); ctx.fill();
        ctx.beginPath(); ctx.roundRect(x+s*0.05,y-s*0.15,s*0.18,s*0.22,3); ctx.fill();
        // Wheels
        ctx.fillStyle = '#333';
        ctx.beginPath(); ctx.arc(x-s*0.3,y+s*0.25,s*0.1,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(x+s*0.3,y+s*0.25,s*0.1,0,Math.PI*2); ctx.fill();
    } else if (o.type==='tree') {
        ctx.fillStyle = '#5d4037'; ctx.beginPath(); ctx.roundRect(x-4,y-s*0.1,8,s*0.6,3); ctx.fill();
        ctx.fillStyle = o.color;
        ctx.beginPath(); ctx.arc(x,y-s*0.3,s*0.45,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = '#2e7d32';
        ctx.beginPath(); ctx.arc(x-s*0.15,y-s*0.4,s*0.25,0,Math.PI*2); ctx.fill();
    } else if (o.type==='house') {
        // Cute round house
        ctx.fillStyle = o.color;
        ctx.beginPath(); ctx.roundRect(x-s*0.45,y-s*0.3,s*0.9,s*0.65,8); ctx.fill();
        // Roof
        ctx.fillStyle = '#e65100';
        ctx.beginPath(); ctx.moveTo(x-s*0.55,y-s*0.3); ctx.lineTo(x,y-s*0.7); ctx.lineTo(x+s*0.55,y-s*0.3); ctx.closePath(); ctx.fill();
        // Door
        ctx.fillStyle = '#4e342e';
        ctx.beginPath(); ctx.roundRect(x-s*0.1,y,s*0.2,s*0.3,4); ctx.fill();
        // Window
        ctx.fillStyle = '#fff9c4';
        ctx.beginPath(); ctx.roundRect(x+s*0.15,y-s*0.15,s*0.18,s*0.18,3); ctx.fill();
        ctx.beginPath(); ctx.roundRect(x-s*0.35,y-s*0.15,s*0.18,s*0.18,3); ctx.fill();
    } else if (o.type==='building') {
        ctx.fillStyle = o.color;
        ctx.beginPath(); ctx.roundRect(x-s*0.3,y-s*0.8,s*0.6,s,10); ctx.fill();
        // Windows (rounded)
        ctx.fillStyle = 'rgba(255,255,100,0.4)';
        for (let wy=0;wy<4;wy++) for (let wx=0;wx<2;wx++) {
            ctx.beginPath(); ctx.roundRect(x-s*0.2+wx*s*0.22, y-s*0.7+wy*s*0.2, s*0.14, s*0.12, 3); ctx.fill();
        }
    } else if (o.type==='tower') {
        ctx.fillStyle = o.color;
        ctx.beginPath(); ctx.roundRect(x-s*0.2,y-s,s*0.4,s*1.2,6); ctx.fill();
        // Antenna
        ctx.fillStyle = '#666'; ctx.fillRect(x-1.5,y-s*1.2,3,s*0.2);
        ctx.fillStyle = '#f44336'; ctx.beginPath(); ctx.arc(x,y-s*1.2,4,0,Math.PI*2); ctx.fill();
        // Windows
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        for (let wy=0;wy<6;wy++) { ctx.beginPath(); ctx.roundRect(x-s*0.12,y-s*0.9+wy*s*0.17,s*0.24,s*0.08,2); ctx.fill(); }
    }
}




function drawHUD() {
    // Timer
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.beginPath(); ctx.roundRect(W/2-30,10,60,36,18); ctx.fill();
    ctx.fillStyle = timeLeft<=10?'#ff1744':'#fff'; ctx.font = 'bold 16px Nunito'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(timeLeft+'s', W/2, 28);
    // Eaten
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.beginPath(); ctx.roundRect(12,12,100,32,12); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 13px Nunito'; ctx.textAlign = 'left';
    ctx.fillText('Eaten: '+player.eaten, 22, 28);
    // Size
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.beginPath(); ctx.roundRect(W-112,12,100,32,12); ctx.fill();
    ctx.fillStyle = '#00e5ff'; ctx.font = 'bold 13px Nunito'; ctx.textAlign = 'right';
    ctx.fillText('Size: '+Math.floor(player.radius), W-22, 28);
    // Leaderboard
    const all = [player,...bots].sort((a,b)=>b.eaten-a.eaten);
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.roundRect(W-130,55,118,all.length*20+22,8); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 10px Nunito'; ctx.textAlign = 'right';
    ctx.fillText('RANKING', W-22, 70);
    all.forEach((h,i) => { ctx.fillStyle = HOLE_COLORS[h.colorIdx].rim; ctx.font = (h.isPlayer?'bold ':'')+' 10px Nunito'; ctx.fillText((i+1)+'. '+h.name+' ('+h.eaten+')', W-22, 88+i*20); });
    // Joystick
    if (joystick.active) {
        ctx.globalAlpha=0.3; ctx.strokeStyle='#333'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(joystick.startX,joystick.startY,50,0,Math.PI*2); ctx.stroke();
        ctx.fillStyle='#333'; ctx.beginPath(); ctx.arc(joystick.startX+joystick.dx*0.4,joystick.startY+joystick.dy*0.4,18,0,Math.PI*2); ctx.fill();
        ctx.globalAlpha=1;
    }
}

function drawMenu() {
    ctx.fillStyle = 'rgba(0,0,0,0.82)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#00e5ff'; ctx.font = 'bold 40px Nunito'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#00e5ff'; ctx.shadowBlur = 15; ctx.fillText('HOLE.IO', W/2, H/2-100); ctx.shadowBlur = 0;
    ctx.fillStyle = '#bbb'; ctx.font = '14px Nunito';
    ctx.fillText('Gerakin lobang, makan semuanya!', W/2, H/2-60);
    ctx.fillStyle = '#888'; ctx.font = '12px Nunito';
    ctx.fillText('Makin gede lobangnya, makin gede yang bisa dimakan', W/2, H/2-35);
    ctx.shadowColor = '#00e5ff'; ctx.shadowBlur = 10; ctx.fillStyle = '#00e5ff';
    ctx.beginPath(); ctx.roundRect(W/2-90,H/2-5,180,50,25); ctx.fill(); ctx.shadowBlur = 0;
    ctx.fillStyle = '#000'; ctx.font = 'bold 20px Nunito'; ctx.fillText('MAIN!', W/2, H/2+20);
    ctx.fillStyle = '#555'; ctx.font = '11px Nunito';
    ctx.fillText('WASD/Arrow/Joystick = gerakin lobang', W/2, H/2+65);
    ctx.fillText('90 detik — makan sebanyak-banyaknya!', W/2, H/2+82);
    if (highScore>0) { ctx.fillStyle='#ffd600'; ctx.font='bold 13px Nunito'; ctx.fillText('Best: '+highScore, W/2, H/2+110); }
}

function drawEnd() {
    ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,H);
    const all = [player,...bots].sort((a,b)=>b.eaten-a.eaten);
    const rank = all.findIndex(h=>h.isPlayer)+1;
    ctx.fillStyle = rank===1?'#ffd600':'#fff'; ctx.font = 'bold 36px Nunito'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(rank===1?'JUARA 1!':'Peringkat #'+rank, W/2, H/2-65);
    ctx.fillStyle = '#fff'; ctx.font = '16px Nunito';
    ctx.fillText('Dimakan: '+player.eaten+' | Size: '+Math.floor(player.radius), W/2, H/2-25);
    if (player.eaten>=highScore&&player.eaten>0) { ctx.fillStyle='#ffd600'; ctx.font='bold 13px Nunito'; ctx.fillText('REKOR BARU!', W/2, H/2); }
    ctx.shadowColor='#00e5ff'; ctx.shadowBlur=10; ctx.fillStyle='#00e5ff';
    ctx.beginPath(); ctx.roundRect(W/2-90,H/2+20,180,48,24); ctx.fill(); ctx.shadowBlur=0;
    ctx.fillStyle='#000'; ctx.font='bold 18px Nunito'; ctx.fillText('MAIN LAGI', W/2, H/2+44);
}

// ===== INPUT =====
document.addEventListener('keydown', e => { pressedKeys[e.key]=true; e.preventDefault(); });
document.addEventListener('keyup', e => { pressedKeys[e.key]=false; });

canvas.addEventListener('touchstart', e => {
    const t=e.touches[0];
    if (state==='menu') { if (t.clientX>W/2-90&&t.clientX<W/2+90&&t.clientY>H/2-5&&t.clientY<H/2+45) initGame(); }
    else if (state==='dead') { if (t.clientX>W/2-90&&t.clientX<W/2+90&&t.clientY>H/2+20&&t.clientY<H/2+68) initGame(); }
    else { joystick.active=true; joystick.startX=t.clientX; joystick.startY=t.clientY; joystick.dx=0; joystick.dy=0; joystick.id=t.identifier; }
    e.preventDefault();
}, {passive:false});
canvas.addEventListener('touchmove', e => { for(const t of e.changedTouches){if(joystick.active&&t.identifier===joystick.id){joystick.dx=t.clientX-joystick.startX;joystick.dy=t.clientY-joystick.startY;}} e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchend', e => { joystick.active=false; joystick.dx=0; joystick.dy=0; e.preventDefault(); }, {passive:false});
canvas.addEventListener('click', e => {
    if (state==='menu') { if (e.clientX>W/2-90&&e.clientX<W/2+90&&e.clientY>H/2-5&&e.clientY<H/2+45) initGame(); }
    if (state==='dead') { if (e.clientX>W/2-90&&e.clientX<W/2+90&&e.clientY>H/2+20&&e.clientY<H/2+68) initGame(); }
});

// ===== GAME LOOP =====
function gameLoop() { requestAnimationFrame(gameLoop); if (state==='playing') update(); else { animFrame++; draw(); } }
state = 'menu';
player = createHole(MAP_W/2,MAP_H/2,0,true,'Kamu');
bots = []; objects = []; particles = [];
