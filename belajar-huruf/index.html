<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Belajar Huruf!</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fff3e0; min-height: 100vh; font-family: 'Nunito', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { font-size: 2rem; color: #e65100; margin: 10px 0; }
        .subtitle { color: #bf360c; font-size: 1rem; margin-bottom: 20px; }
        .letter-display { font-size: clamp(8rem, 30vw, 14rem); font-weight: 900; color: #ff6d00; text-shadow: 4px 4px 0 #ffcc80; animation: pop 0.5s ease; margin: 10px 0; }
        @keyframes pop { 0% { transform: scale(0.5); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .word { font-size: 1.5rem; color: #4e342e; margin: 5px 0; }
        .emoji-pic { font-size: 4rem; margin: 5px 0; }
        .buttons { display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
        .btn { padding: 14px 30px; border: none; border-radius: 50px; font-size: 1.1rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: transform 0.2s; }
        .btn:active { transform: scale(0.9); }
        .btn-prev { background: #ffcc80; color: #e65100; }
        .btn-next { background: #ff6d00; color: #fff; }
        .btn-sound { background: #fff3e0; color: #ff6d00; border: 2px solid #ff6d00; font-size: 1.5rem; padding: 12px 20px; }
        .progress { margin-top: 15px; color: #bf360c; font-size: 0.9rem; }
        .choices { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-top: 15px; max-width: 300px; }
        .choice { padding: 12px; border-radius: 12px; font-size: 1.2rem; font-weight: 700; border: 3px solid #ffcc80; background: #fff; cursor: pointer; transition: all 0.2s; text-align: center; }
        .choice:active { transform: scale(0.9); }
        .choice.correct { background: #c8e6c9; border-color: #4caf50; }
        .choice.wrong { background: #ffcdd2; border-color: #f44336; }
        .score { font-size: 1.1rem; color: #2e7d32; margin-top: 10px; font-weight: 700; }
    </style>
</head>
<body>
    <h1>Belajar Huruf ABC!</h1>
    <p class="subtitle">Tap huruf yang benar ya!</p>
    <div class="emoji-pic" id="emoji"></div>
    <div class="word" id="word"></div>
    <div class="choices" id="choices"></div>
    <div class="score" id="score"></div>
    <div class="buttons">
        <button class="btn btn-next" id="nextBtn">Selanjutnya →</button>
    </div>
    <div class="progress" id="progress"></div>

    <script>
    const DATA = [
        { huruf: 'A', kata: 'Ayam', emoji: '🐔' },
        { huruf: 'B', kata: 'Bola', emoji: '⚽' },
        { huruf: 'C', kata: 'Cacing', emoji: '🪱' },
        { huruf: 'D', kata: 'Domba', emoji: '🐑' },
        { huruf: 'E', kata: 'Elang', emoji: '🦅' },
        { huruf: 'F', kata: 'Film', emoji: '🎬' },
        { huruf: 'G', kata: 'Gajah', emoji: '🐘' },
        { huruf: 'H', kata: 'Harimau', emoji: '🐯' },
        { huruf: 'I', kata: 'Ikan', emoji: '🐟' },
        { huruf: 'J', kata: 'Jeruk', emoji: '🍊' },
        { huruf: 'K', kata: 'Kucing', emoji: '🐱' },
        { huruf: 'L', kata: 'Lebah', emoji: '🐝' },
        { huruf: 'M', kata: 'Monyet', emoji: '🐵' },
        { huruf: 'N', kata: 'Nanas', emoji: '🍍' },
        { huruf: 'O', kata: 'Onta', emoji: '🐫' },
        { huruf: 'P', kata: 'Panda', emoji: '🐼' },
        { huruf: 'Q', kata: 'Queen', emoji: '👸' },
        { huruf: 'R', kata: 'Rubah', emoji: '🦊' },
        { huruf: 'S', kata: 'Singa', emoji: '🦁' },
        { huruf: 'T', kata: 'Tikus', emoji: '🐭' },
        { huruf: 'U', kata: 'Ular', emoji: '🐍' },
        { huruf: 'V', kata: 'Vas', emoji: '🏺' },
        { huruf: 'W', kata: 'Wortel', emoji: '🥕' },
        { huruf: 'X', kata: 'Xylophone', emoji: '🎶' },
        { huruf: 'Y', kata: 'Yoyo', emoji: '🪀' },
        { huruf: 'Z', kata: 'Zebra', emoji: '🦓' },
    ];

    let current = 0, benar = 0, total = 0;

    function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

    function show() {
        const d = DATA[current];
        document.getElementById('emoji').textContent = d.emoji;
        document.getElementById('word').textContent = d.kata;
        document.getElementById('progress').textContent = 'Huruf ' + (current+1) + ' / ' + DATA.length;
        document.getElementById('score').textContent = 'Benar: ' + benar + ' / ' + total;

        // Generate 4 choices (1 correct + 3 random)
        let choices = [d.huruf];
        while (choices.length < 4) {
            const r = DATA[Math.floor(Math.random() * DATA.length)].huruf;
            if (!choices.includes(r)) choices.push(r);
        }
        choices = shuffle(choices);

        const el = document.getElementById('choices');
        el.innerHTML = '';
        choices.forEach(c => {
            const btn = document.createElement('div');
            btn.className = 'choice';
            btn.textContent = c;
            btn.onclick = () => answer(btn, c, d.huruf);
            el.appendChild(btn);
        });
    }

    function answer(btn, picked, correct) {
        total++;
        document.querySelectorAll('.choice').forEach(c => c.onclick = null);
        if (picked === correct) {
            btn.classList.add('correct');
            benar++;
        } else {
            btn.classList.add('wrong');
            document.querySelectorAll('.choice').forEach(c => { if (c.textContent === correct) c.classList.add('correct'); });
        }
        document.getElementById('score').textContent = 'Benar: ' + benar + ' / ' + total;
    }

    document.getElementById('nextBtn').onclick = () => {
        current = (current + 1) % DATA.length;
        show();
    };

    show();
    </script>
</body>
</html>
