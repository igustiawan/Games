<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Arena!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            background: #0a0a1a;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
        }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ===== GAME CONFIG =====
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W, H, cellSize, cols, rows;
let snake, food, particles, direction, nextDir;
let score, highScore, speed, gameLoop, state;
let touchStartX, touchStartY;
let animFrame = 0;

// Snake skins (like android snake games)
const SKINS = [
    { body: '#00e676', head: '#69f0ae', glow: '#00e676' },
    { body: '#00bcd4', head: '#4dd0e1', glow: '#00bcd4' },
    { body: '#ff5722', head: '#ff8a65', glow: '#ff5722' },
    { body: '#e040fb', head: '#ea80fc', glow: '#e040fb' },
    { body: '#ffea00', head: '#ffff00', glow: '#ffea00' },
];
let skin = SKINS[0];

// Food types with colors
const FOOD_TYPES = [
    { color: '#ff1744', glow: '#ff5252', points: 1, size: 1 },
    { color: '#f50057', glow: '#ff4081', points: 1, size: 1 },
    { color: '#d500f9', glow: '#e040fb', points: 2, size: 1.2 },
    { color: '#00e5ff', glow: '#18ffff', points: 2, size: 1.2 },
    { color: '#76ff03', glow: '#b2ff59', points: 1, size: 1 },
    { color: '#ffd600', glow: '#ffff00', points: 3, size: 1.4 },
];

highScore = parseInt(localStorage.getItem('snakeHS2') || '0');

function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
    cellSize = Math.floor(Math.min(W, H) / 25);
    cols = Math.floor(W / cellSize);
    rows = Math.floor(H / cellSize);
}
resize();
window.addEventListener('resize', resize);

// ===== PARTICLES =====
function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8,
            life: 1,
            color: color,
            size: Math.random() * 4 + 2
        });
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.03;
        p.size *= 0.97;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function drawParticles() {
    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
}

// ===== GAME FUNCTIONS =====
function init() {
    const startX = Math.floor(cols / 2);
    const startY = Math.floor(rows / 2);
    snake = [];
    for (let i = 0; i < 4; i++) {
        snake.push({ x: startX - i, y: startY });
    }
    direction = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    speed = 130;
    particles = [];
    food = [];
    skin = SKINS[Math.floor(Math.random() * SKINS.length)];
    for (let i = 0; i < 5; i++) placeFood();
    state = 'playing';
    if (gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(update, speed);
}

function placeFood() {
    let pos;
    let attempts = 0;
    do {
        pos = {
            x: Math.floor(Math.random() * (cols - 2)) + 1,
            y: Math.floor(Math.random() * (rows - 2)) + 1
        };
        attempts++;
    } while (attempts < 100 && (
        snake.some(s => s.x === pos.x && s.y === pos.y) ||
        food.some(f => f.x === pos.x && f.y === pos.y)
    ));
    const type = FOOD_TYPES[Math.floor(Math.random() * FOOD_TYPES.length)];
    food.push({ ...pos, ...type, pulse: Math.random() * Math.PI * 2 });
}

function update() {
    if (state !== 'playing') return;
    animFrame++;
    direction = { ...nextDir };

    const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
    };

    // Wall collision
    if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
        die(); return;
    }
    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
        die(); return;
    }

    snake.unshift(head);

    // Check food
    let ate = false;
    for (let i = food.length - 1; i >= 0; i--) {
        if (food[i].x === head.x && food[i].y === head.y) {
            score += food[i].points;
            spawnParticles(
                head.x * cellSize + cellSize / 2,
                head.y * cellSize + cellSize / 2,
                food[i].color, 12
            );
            food.splice(i, 1);
            placeFood();
            ate = true;
            // Speed up
            if (speed > 70) {
                speed -= 1;
                clearInterval(gameLoop);
                gameLoop = setInterval(update, speed);
            }
            break;
        }
    }
    if (!ate) snake.pop();

    updateParticles();
    draw();
}

function die() {
    state = 'dead';
    clearInterval(gameLoop);
    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    // Explode snake
    snake.forEach(s => {
        spawnParticles(
            s.x * cellSize + cellSize / 2,
            s.y * cellSize + cellSize / 2,
            skin.body, 4
        );
    });
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('snakeHS2', highScore);
    }
    // Keep drawing for death animation
    let deathFrames = 0;
    const deathAnim = setInterval(() => {
        deathFrames++;
        updateParticles();
        draw();
        if (deathFrames > 60) clearInterval(deathAnim);
    }, 16);
}

// ===== DRAWING =====
function draw() {
    // Dark background
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, W, H);

    // Grid (subtle hexagonal feel)
    ctx.strokeStyle = 'rgba(50, 50, 80, 0.3)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= cols; x++) {
        ctx.beginPath();
        ctx.moveTo(x * cellSize, 0);
        ctx.lineTo(x * cellSize, rows * cellSize);
        ctx.stroke();
    }
    for (let y = 0; y <= rows; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * cellSize);
        ctx.lineTo(cols * cellSize, y * cellSize);
        ctx.stroke();
    }

    // Border glow
    ctx.strokeStyle = 'rgba(100, 100, 255, 0.15)';
    ctx.lineWidth = 3;
    ctx.strokeRect(0, 0, cols * cellSize, rows * cellSize);

    // Draw food
    food.forEach(f => {
        f.pulse += 0.05;
        const px = f.x * cellSize + cellSize / 2;
        const py = f.y * cellSize + cellSize / 2;
        const pulseSize = 1 + Math.sin(f.pulse) * 0.15;
        const radius = (cellSize / 2.5) * f.size * pulseSize;

        // Outer glow
        ctx.shadowColor = f.glow;
        ctx.shadowBlur = 15;
        ctx.fillStyle = f.glow;
        ctx.globalAlpha = 0.3;
        ctx.beginPath();
        ctx.arc(px, py, radius + 4, 0, Math.PI * 2);
        ctx.fill();

        // Main circle
        ctx.globalAlpha = 1;
        ctx.fillStyle = f.color;
        ctx.beginPath();
        ctx.arc(px, py, radius, 0, Math.PI * 2);
        ctx.fill();

        // Shine
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.beginPath();
        ctx.arc(px - radius * 0.3, py - radius * 0.3, radius * 0.25, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    });

    // Draw snake
    if (state === 'playing' || state === 'dead') {
        drawSnake();
    }

    // Draw particles
    drawParticles();

    // UI Overlay
    drawUI();
}

function drawSnake() {
    const segRadius = cellSize * 0.42;

    // Body segments (draw from tail to head)
    for (let i = snake.length - 1; i >= 0; i--) {
        const seg = snake[i];
        const px = seg.x * cellSize + cellSize / 2;
        const py = seg.y * cellSize + cellSize / 2;

        // Body glow
        if (i === 0) {
            ctx.shadowColor = skin.glow;
            ctx.shadowBlur = 20;
        } else {
            ctx.shadowColor = skin.glow;
            ctx.shadowBlur = 6;
        }

        // Gradient from head to tail
        const t = i / snake.length;
        const alpha = 1 - t * 0.4;
        const radius = segRadius * (1 - t * 0.25);

        ctx.globalAlpha = alpha;
        ctx.fillStyle = i === 0 ? skin.head : skin.body;
        ctx.beginPath();
        ctx.arc(px, py, radius, 0, Math.PI * 2);
        ctx.fill();

        // Connect segments (smooth body)
        if (i > 0) {
            const prev = snake[i - 1];
            const ppx = prev.x * cellSize + cellSize / 2;
            const ppy = prev.y * cellSize + cellSize / 2;
            const prevT = (i - 1) / snake.length;
            const connRadius = segRadius * (1 - prevT * 0.25) * 0.7;
            
            ctx.fillStyle = skin.body;
            ctx.beginPath();
            ctx.arc((px + ppx) / 2, (py + ppy) / 2, connRadius, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.shadowBlur = 0;
    }
    ctx.globalAlpha = 1;

    // Draw head details (eyes)
    if (snake.length > 0) {
        const head = snake[0];
        const hx = head.x * cellSize + cellSize / 2;
        const hy = head.y * cellSize + cellSize / 2;
        const eyeOffset = cellSize * 0.18;
        const eyeRadius = cellSize * 0.1;
        const pupilRadius = cellSize * 0.06;

        let ex1, ey1, ex2, ey2;
        if (direction.x === 1) {
            ex1 = hx + eyeOffset * 0.5; ey1 = hy - eyeOffset;
            ex2 = hx + eyeOffset * 0.5; ey2 = hy + eyeOffset;
        } else if (direction.x === -1) {
            ex1 = hx - eyeOffset * 0.5; ey1 = hy - eyeOffset;
            ex2 = hx - eyeOffset * 0.5; ey2 = hy + eyeOffset;
        } else if (direction.y === -1) {
            ex1 = hx - eyeOffset; ey1 = hy - eyeOffset * 0.5;
            ex2 = hx + eyeOffset; ey2 = hy - eyeOffset * 0.5;
        } else {
            ex1 = hx - eyeOffset; ey1 = hy + eyeOffset * 0.5;
            ex2 = hx + eyeOffset; ey2 = hy + eyeOffset * 0.5;
        }

        // White eyes
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(ex1, ey1, eyeRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(ex2, ey2, eyeRadius, 0, Math.PI * 2);
        ctx.fill();

        // Pupils
        ctx.fillStyle = '#111';
        ctx.beginPath();
        ctx.arc(ex1 + direction.x * 2, ey1 + direction.y * 2, pupilRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(ex2 + direction.x * 2, ey2 + direction.y * 2, pupilRadius, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawUI() {
    // Score (top left)
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    roundRect(ctx, 15, 15, 160, 50, 12);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px -apple-system, sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('Skor: ' + score, 30, 40);

    // High score (top right)
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    roundRect(ctx, W - 175, 15, 160, 50, 12);
    ctx.fill();
    ctx.fillStyle = '#ffd600';
    ctx.textAlign = 'right';
    ctx.fillText('Terbaik: ' + highScore, W - 30, 40);
    ctx.globalAlpha = 1;

    // Length indicator
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    roundRect(ctx, W / 2 - 60, 15, 120, 35, 10);
    ctx.fill();
    ctx.fillStyle = skin.glow;
    ctx.textAlign = 'center';
    ctx.font = 'bold 14px -apple-system, sans-serif';
    ctx.fillText('Panjang: ' + snake.length, W / 2, 33);

    // Start screen
    if (state === 'start') {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, W, H);
        
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 48px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Snake Arena', W / 2, H / 2 - 60);
        
        ctx.font = '20px -apple-system, sans-serif';
        ctx.fillStyle = '#aaa';
        ctx.fillText('Makan bola warna-warni biar makin gede!', W / 2, H / 2 - 10);

        // Start button
        ctx.shadowColor = '#00e676';
        ctx.shadowBlur = 20;
        ctx.fillStyle = '#00e676';
        roundRect(ctx, W / 2 - 100, H / 2 + 30, 200, 60, 30);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#000';
        ctx.font = 'bold 22px -apple-system, sans-serif';
        ctx.fillText('MAIN!', W / 2, H / 2 + 62);

        ctx.fillStyle = '#666';
        ctx.font = '14px -apple-system, sans-serif';
        ctx.fillText('Swipe atau pakai tombol panah', W / 2, H / 2 + 120);
    }

    // Game over screen
    if (state === 'dead') {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, W, H);

        ctx.fillStyle = '#ff1744';
        ctx.font = 'bold 42px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', W / 2, H / 2 - 60);

        ctx.fillStyle = '#fff';
        ctx.font = '24px -apple-system, sans-serif';
        ctx.fillText('Skor: ' + score, W / 2, H / 2 - 10);

        if (score >= highScore && score > 0) {
            ctx.fillStyle = '#ffd600';
            ctx.font = '18px -apple-system, sans-serif';
            ctx.fillText('REKOR BARU!', W / 2, H / 2 + 20);
        }

        // Restart button
        ctx.shadowColor = '#00e676';
        ctx.shadowBlur = 15;
        ctx.fillStyle = '#00e676';
        roundRect(ctx, W / 2 - 100, H / 2 + 45, 200, 55, 28);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#000';
        ctx.font = 'bold 20px -apple-system, sans-serif';
        ctx.fillText('MAIN LAGI', W / 2, H / 2 + 74);
    }
}

function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

// ===== CONTROLS =====
// Keyboard
document.addEventListener('keydown', (e) => {
    if (state === 'start' || state === 'dead') {
        init(); return;
    }
    switch(e.key) {
        case 'ArrowUp': case 'w': case 'W':
            if (direction.y !== 1) nextDir = { x: 0, y: -1 }; break;
        case 'ArrowDown': case 's': case 'S':
            if (direction.y !== -1) nextDir = { x: 0, y: 1 }; break;
        case 'ArrowLeft': case 'a': case 'A':
            if (direction.x !== 1) nextDir = { x: -1, y: 0 }; break;
        case 'ArrowRight': case 'd': case 'D':
            if (direction.x !== -1) nextDir = { x: 1, y: 0 }; break;
    }
    e.preventDefault();
});

// Touch controls
document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
document.addEventListener('gesturestart', (e) => e.preventDefault());

canvas.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    
    // Check if tapping button
    if (state === 'start' || state === 'dead') {
        const tx = touchStartX;
        const ty = touchStartY;
        const btnY = state === 'start' ? H / 2 + 30 : H / 2 + 45;
        const btnH = state === 'start' ? 60 : 55;
        if (tx > W / 2 - 100 && tx < W / 2 + 100 && ty > btnY && ty < btnY + btnH) {
            init();
        }
    }
    e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    if (state !== 'playing') return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const minSwipe = 20;
    
    if (Math.abs(dx) < minSwipe && Math.abs(dy) < minSwipe) return;
    
    if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0 && direction.x !== -1) nextDir = { x: 1, y: 0 };
        else if (dx < 0 && direction.x !== 1) nextDir = { x: -1, y: 0 };
    } else {
        if (dy > 0 && direction.y !== -1) nextDir = { x: 0, y: 1 };
        else if (dy < 0 && direction.y !== 1) nextDir = { x: 0, y: -1 };
    }
    e.preventDefault();
}, { passive: false });

// Mouse click for start/restart on desktop
canvas.addEventListener('click', (e) => {
    if (state === 'start' || state === 'dead') {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const btnY = state === 'start' ? H / 2 + 30 : H / 2 + 45;
        const btnH = state === 'start' ? 60 : 55;
        if (mx > W / 2 - 100 && mx < W / 2 + 100 && my > btnY && my < btnY + btnH) {
            init();
        }
    }
});

// ===== START =====
state = 'start';
snake = [];
food = [];
particles = [];
score = 0;
direction = { x: 1, y: 0 };
nextDir = { x: 1, y: 0 };

// Draw start screen
function drawStart() {
    draw();
}
drawStart();
</script>

</body>
</html>
