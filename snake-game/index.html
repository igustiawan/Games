<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ular Lapar! - Game Seru untuk Anak-anak</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: 'Comic Sans MS', 'Chalkboard SE', -apple-system, cursive;
            padding: 10px;
            padding-top: env(safe-area-inset-top, 10px);
        }

        .game-title {
            color: #fff;
            font-size: clamp(1.5em, 5vw, 2.5em);
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            margin-bottom: 8px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .score-board {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }

        .score-item {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 8px 16px;
            color: white;
            font-size: clamp(0.9em, 3vw, 1.3em);
            font-weight: bold;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .game-container {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border: 3px solid rgba(255,255,255,0.4);
            width: min(85vw, 85vh - 250px, 400px);
            height: min(85vw, 85vh - 250px, 400px);
        }

        canvas {
            display: block;
            background: #1a1a2e;
            width: 100%;
            height: 100%;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(5px);
            z-index: 10;
            padding: 20px;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            color: #fff;
            font-size: clamp(1.5em, 5vw, 2em);
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .overlay p {
            color: #ddd;
            font-size: clamp(0.9em, 3vw, 1.2em);
            margin-bottom: 20px;
            text-align: center;
        }

        .btn {
            background: linear-gradient(45deg, #f093fb, #f5576c);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: clamp(1.1em, 4vw, 1.3em);
            font-family: inherit;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 20px rgba(240, 87, 108, 0.4);
            -webkit-user-select: none;
            user-select: none;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .controls-info {
            color: rgba(255,255,255,0.7);
            margin-top: 8px;
            font-size: 0.85em;
            text-align: center;
        }

        /* Mobile D-Pad - ALWAYS visible on touch devices */
        .mobile-controls {
            display: none;
            margin-top: 12px;
        }

        .d-pad {
            display: grid;
            grid-template-columns: 70px 70px 70px;
            grid-template-rows: 70px 70px 70px;
            grid-template-areas:
                ". up ."
                "left . right"
                ". down .";
            gap: 6px;
            justify-content: center;
        }

        .d-pad button {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 3px solid rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 2em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-user-select: none;
            user-select: none;
            transition: background 0.1s, transform 0.1s;
        }

        .d-pad button:active, .d-pad button.pressed {
            background: rgba(255,255,255,0.5);
            transform: scale(0.9);
            border-color: rgba(255,255,255,0.8);
        }

        .d-pad .up { grid-area: up; }
        .d-pad .down { grid-area: down; }
        .d-pad .left { grid-area: left; }
        .d-pad .right { grid-area: right; }

        /* Show mobile controls on touch devices */
        @media (pointer: coarse), (max-width: 768px) {
            .mobile-controls {
                display: block;
            }
            .controls-info {
                display: none;
            }
            body {
                justify-content: flex-start;
                padding-top: 15px;
            }
            .game-title {
                margin-bottom: 5px;
            }
            .score-board {
                margin-bottom: 8px;
            }
        }

        /* Very small phones */
        @media (max-height: 600px) {
            .game-title { font-size: 1.3em; margin-bottom: 3px; }
            .score-item { padding: 5px 12px; font-size: 0.85em; }
            .score-board { margin-bottom: 5px; gap: 10px; }
            .game-container {
                width: min(60vw, 45vh, 280px);
                height: min(60vw, 45vh, 280px);
            }
            .d-pad button { width: 55px; height: 55px; font-size: 1.5em; }
            .d-pad {
                grid-template-columns: 55px 55px 55px;
                grid-template-rows: 55px 55px 55px;
                gap: 4px;
            }
        }

        /* Landscape mobile */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                flex-direction: row;
                justify-content: center;
                gap: 20px;
                padding: 5px 20px;
            }
            .game-title { display: none; }
            .score-board { 
                position: absolute; 
                top: 5px; 
                left: 50%;
                transform: translateX(-50%);
            }
            .game-container {
                width: min(80vh, 300px);
                height: min(80vh, 300px);
            }
            .d-pad button { width: 50px; height: 50px; font-size: 1.4em; }
            .d-pad {
                grid-template-columns: 50px 50px 50px;
                grid-template-rows: 50px 50px 50px;
            }
        }
    </style>
</head>
<body>
    <h1 class="game-title">Ular Lapar!</h1>
    
    <div class="score-board">
        <div class="score-item">Skor: <span id="score">0</span></div>
        <div class="score-item">Terbaik: <span id="highScore">0</span></div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div class="overlay" id="startScreen">
            <h2>Ular Lapar!</h2>
            <p>Makan makanan biar ularnya makin gede!</p>
            <button class="btn" id="startBtn">Main Yuk!</button>
        </div>

        <div class="overlay hidden" id="gameOverScreen">
            <h2>Game Over!</h2>
            <p>Skor kamu: <span id="finalScore">0</span></p>
            <button class="btn" id="restartBtn">Main Lagi!</button>
        </div>
    </div>

    <div class="controls-info">
        Pakai tombol panah atau WASD untuk gerakin ularnya
    </div>

    <div class="mobile-controls">
        <div class="d-pad">
            <button class="up" id="btnUp">&#9650;</button>
            <button class="left" id="btnLeft">&#9664;</button>
            <button class="right" id="btnRight">&#9654;</button>
            <button class="down" id="btnDown">&#9660;</button>
        </div>
    </div>

    <script>
        // Prevent all default touch behaviors (no zoom, no scroll)
        document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
        document.addEventListener('gesturestart', (e) => e.preventDefault());
        document.addEventListener('gesturechange', (e) => e.preventDefault());

        // Game Configuration
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        // Game State
        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let gameSpeed = 150;
        let isGameRunning = false;

        // Colors for the snake body (rainbow!)
        const snakeColors = [
            '#00ff87', '#00e676', '#00c853', '#00b248',
            '#009624', '#2e7d32', '#1b5e20', '#33691e'
        ];

        // Food emojis
        const foodEmojis = ['🍎', '🍊', '🍇', '🍓', '🍌', '🍕', '🍩', '🌟', '🍪', '🧁'];
        let currentFoodEmoji = '🍎';

        // UI Elements
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreEl = document.getElementById('finalScore');

        // Initialize
        highScoreEl.textContent = highScore;

        // Event Listeners
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        // Keyboard Controls
        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown': case 's': case 'S':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft': case 'a': case 'A':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight': case 'd': case 'D':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
            e.preventDefault();
        });

        // Mobile D-Pad Controls - using touchstart for instant response
        function setupDPadButton(id, dirCheck, newDir) {
            const btn = document.getElementById(id);
            
            const handlePress = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (!isGameRunning) return;
                if (dirCheck()) {
                    nextDirection = newDir;
                }
                btn.classList.add('pressed');
                setTimeout(() => btn.classList.remove('pressed'), 150);
            };

            btn.addEventListener('touchstart', handlePress, { passive: false });
            btn.addEventListener('mousedown', handlePress);
        }

        setupDPadButton('btnUp', () => direction.y !== 1, { x: 0, y: -1 });
        setupDPadButton('btnDown', () => direction.y !== -1, { x: 0, y: 1 });
        setupDPadButton('btnLeft', () => direction.x !== 1, { x: -1, y: 0 });
        setupDPadButton('btnRight', () => direction.x !== -1, { x: 1, y: 0 });

        // Touch swipe support on game canvas
        let touchStartX = 0;
        let touchStartY = 0;
        let touchStartTime = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            touchStartTime = Date.now();
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            if (!isGameRunning) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            const elapsed = Date.now() - touchStartTime;
            
            // Only register swipe if it's fast enough and long enough
            const minSwipe = 20;
            if (elapsed < 500 && (Math.abs(dx) > minSwipe || Math.abs(dy) > minSwipe)) {
                if (Math.abs(dx) > Math.abs(dy)) {
                    if (dx > 0 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    else if (dx < 0 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
                } else {
                    if (dy > 0 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    else if (dy < 0 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
                }
            }
            e.preventDefault();
        }, { passive: false });

        function startGame() {
            // Reset game state
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameSpeed = 150;
            scoreEl.textContent = score;

            // Hide overlays
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');

            // Place food
            placeFood();

            // Start game loop
            isGameRunning = true;
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, gameSpeed);
        }

        function placeFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(seg => seg.x === newFood.x && seg.y === newFood.y));
            
            food = newFood;
            currentFoodEmoji = foodEmojis[Math.floor(Math.random() * foodEmojis.length)];
        }

        function update() {
            // Update direction
            direction = { ...nextDirection };

            // Move snake
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // Check wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // Check self collision
            if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                gameOver();
                return;
            }

            // Add new head
            snake.unshift(head);

            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                placeFood();

                // Speed up slightly (but not too fast for kids)
                if (gameSpeed > 90) {
                    gameSpeed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(update, gameSpeed);
                }
            } else {
                snake.pop();
            }

            // Draw
            draw();
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid (subtle)
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // Draw snake
            snake.forEach((segment, index) => {
                const colorIndex = index % snakeColors.length;
                const radius = index === 0 ? 10 : 8;

                // Body glow
                if (index === 0) {
                    ctx.shadowColor = '#00ff87';
                    ctx.shadowBlur = 15;
                }

                ctx.fillStyle = snakeColors[colorIndex];
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    radius
                );
                ctx.fill();

                ctx.shadowBlur = 0;

                // Draw eyes on head
                if (index === 0) {
                    ctx.fillStyle = 'white';
                    let eyeX1, eyeY1, eyeX2, eyeY2;
                    
                    if (direction.x === 1) {
                        eyeX1 = segment.x * gridSize + 13;
                        eyeY1 = segment.y * gridSize + 5;
                        eyeX2 = segment.x * gridSize + 13;
                        eyeY2 = segment.y * gridSize + 13;
                    } else if (direction.x === -1) {
                        eyeX1 = segment.x * gridSize + 5;
                        eyeY1 = segment.y * gridSize + 5;
                        eyeX2 = segment.x * gridSize + 5;
                        eyeY2 = segment.y * gridSize + 13;
                    } else if (direction.y === -1) {
                        eyeX1 = segment.x * gridSize + 5;
                        eyeY1 = segment.y * gridSize + 5;
                        eyeX2 = segment.x * gridSize + 13;
                        eyeY2 = segment.y * gridSize + 5;
                    } else {
                        eyeX1 = segment.x * gridSize + 5;
                        eyeY1 = segment.y * gridSize + 13;
                        eyeX2 = segment.x * gridSize + 13;
                        eyeY2 = segment.y * gridSize + 13;
                    }

                    ctx.beginPath();
                    ctx.arc(eyeX1, eyeY1, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(eyeX2, eyeY2, 3, 0, Math.PI * 2);
                    ctx.fill();

                    // Pupils
                    ctx.fillStyle = '#1a1a2e';
                    ctx.beginPath();
                    ctx.arc(eyeX1 + direction.x, eyeY1 + direction.y, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(eyeX2 + direction.x, eyeY2 + direction.y, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            // Draw food with emoji
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(
                currentFoodEmoji,
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2
            );

            // Food glow effect
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 10;
            ctx.fillStyle = 'rgba(255, 107, 107, 0.1)';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2, 0, Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function gameOver() {
            isGameRunning = false;
            clearInterval(gameLoop);

            // Vibrate on game over (mobile feedback)
            if (navigator.vibrate) {
                navigator.vibrate(200);
            }

            // Update high score
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreEl.textContent = highScore;
            }

            // Show game over screen
            finalScoreEl.textContent = score;
            gameOverScreen.classList.remove('hidden');
        }

        // Initial draw
        function drawInitial() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const previewSnake = [
                {x: 12, y: 10}, {x: 11, y: 10}, {x: 10, y: 10},
                {x: 9, y: 10}, {x: 8, y: 10}
            ];
            previewSnake.forEach((seg, i) => {
                ctx.fillStyle = snakeColors[i % snakeColors.length];
                ctx.beginPath();
                ctx.roundRect(seg.x * gridSize + 1, seg.y * gridSize + 1, gridSize - 2, gridSize - 2, 8);
                ctx.fill();
            });
        }
        drawInitial();
    </script>
</body>
</html>
