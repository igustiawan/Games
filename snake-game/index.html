<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Arena!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; overflow: hidden; touch-action: none; background: #0a0a1a; }
        body { display: flex; align-items: center; justify-content: center; font-family: -apple-system, sans-serif; min-height: 100dvh; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
document.addEventListener('gesturestart', e => e.preventDefault());

// ===== GAME CONFIG =====
const MAP_W = 3000, MAP_H = 3000;
const SEG_DIST = 12; // distance between segments
const BASE_SPEED = 3;
const BOOST_SPEED = 5;
const FOOD_COUNT = 200;
const AI_COUNT = 10;
const TURN_SPEED = 0.06;
const AI_TURN_SPEED = 0.04;

// Colors
const SKINS = [
    { id: 'dragon', name: 'Naga Api', colors: ['#ff5722','#ff3d00','#dd2c00'], type: 'dragon', headShape: 'horns', bodyPattern: 'scales', glowColor: '#ff5722', eyeColor: '#ffd600' },
    { id: 'ice', name: 'Naga Es', colors: ['#00bcd4','#0097a7','#00838f'], type: 'dragon', headShape: 'horns', bodyPattern: 'crystals', glowColor: '#00e5ff', eyeColor: '#80deea' },
    { id: 'shadow', name: 'Naga Bayangan', colors: ['#9c27b0','#7b1fa2','#4a148c'], type: 'dragon', headShape: 'horns', bodyPattern: 'smoke', glowColor: '#e040fb', eyeColor: '#ea80fc' },
    { id: 'gold', name: 'Naga Emas', colors: ['#ffd600','#ffab00','#ff6f00'], type: 'dragon', headShape: 'crown', bodyPattern: 'scales', glowColor: '#ffd600', eyeColor: '#fff' },
    { id: 'viper', name: 'Ular Viper', colors: ['#00e676','#00c853','#1b5e20'], type: 'viper', headShape: 'viper', bodyPattern: 'stripes', glowColor: '#00e676', eyeColor: '#ffeb3b' },
    { id: 'cobra', name: 'King Cobra', colors: ['#ff1744','#d50000','#b71c1c'], type: 'cobra', headShape: 'hood', bodyPattern: 'diamond', glowColor: '#ff1744', eyeColor: '#fff' },
    { id: 'electric', name: 'Listrik', colors: ['#ffeb3b','#ffc107','#fff176'], type: 'electric', headShape: 'bolt', bodyPattern: 'electric', glowColor: '#ffeb3b', eyeColor: '#fff' },
    { id: 'galaxy', name: 'Galaxy', colors: ['#ea80fc','#aa00ff','#6200ea'], type: 'galaxy', headShape: 'cosmic', bodyPattern: 'stars', glowColor: '#ea80fc', eyeColor: '#fff' },
    { id: 'toxic', name: 'Toxic', colors: ['#76ff03','#64dd17','#aeea00'], type: 'toxic', headShape: 'fangs', bodyPattern: 'bubbles', glowColor: '#76ff03', eyeColor: '#ff1744' },
    { id: 'lava', name: 'Lava', colors: ['#ff6d00','#ff3d00','#dd2c00'], type: 'lava', headShape: 'rock', bodyPattern: 'lava', glowColor: '#ff6d00', eyeColor: '#ffd600' },
    { id: 'ghost', name: 'Hantu', colors: ['#b0bec5','#78909c','#546e7a'], type: 'ghost', headShape: 'ghost', bodyPattern: 'fade', glowColor: '#b0bec5', eyeColor: '#f44336' },
];

// For backward compat
const SNAKE_COLORS = SKINS.map(s => s.colors);
const SKIN_NAMES = SKINS.map(s => s.name);

let selectedSkin = parseInt(localStorage.getItem('snakeSkin') || '0');

let state = 'menu'; // menu, skin, playing, dead
let player, aiSnakes, foods, particles;
let camera = { x: 0, y: 0 };
let score, highScore;
let joystick = { active: false, startX: 0, startY: 0, dx: 0, dy: 0, id: -1 };
let mouseAngle = 0, mouseActive = false;
let boosting = false;
let animFrame = 0;
let killCount = 0;

highScore = parseInt(localStorage.getItem('snakeArenaHS') || '0');

// ===== SNAKE CLASS =====
function createSnake(x, y, length, colorSet, isPlayer, skinIdx) {
    const segments = [];
    for (let i = 0; i < length; i++) {
        segments.push({ x: x - i * SEG_DIST, y: y });
    }
    return {
        segments, angle: 0, targetAngle: 0,
        speed: BASE_SPEED, colors: colorSet,
        alive: true, isPlayer,
        length, boosting: false,
        skinIdx: skinIdx !== undefined ? skinIdx : Math.floor(Math.random() * SKINS.length),
        name: isPlayer ? 'Kamu' : 'Bot ' + Math.floor(Math.random() * 99),
    };
}

function getSnakeSize(snake) { return snake.segments.length; }
function getHeadRadius(snake) { return Math.min(8 + snake.segments.length * 0.15, 22); }
function getSegRadius(snake) { return Math.min(6 + snake.segments.length * 0.12, 18); }




// ===== FOOD =====
function spawnFood() {
    return { x: Math.random() * MAP_W, y: Math.random() * MAP_H, color: `hsl(${Math.random()*360},80%,60%)`, size: 4 + Math.random() * 4, pulse: Math.random() * Math.PI * 2 };
}

function spawnFoodAt(x, y, count) {
    for (let i = 0; i < count; i++) {
        foods.push({ x: x + (Math.random()-0.5)*60, y: y + (Math.random()-0.5)*60, color: `hsl(${Math.random()*360},80%,60%)`, size: 5 + Math.random()*4, pulse: Math.random()*Math.PI*2 });
    }
}

// ===== AI LOGIC =====
function updateAI(snake) {
    if (!snake.alive) return;
    const head = snake.segments[0];

    // Find nearest target (food or smaller snake head)
    let targetX = null, targetY = null;
    let bestDist = 500;

    // Look for food
    foods.forEach(f => {
        const d = Math.hypot(f.x - head.x, f.y - head.y);
        if (d < bestDist) { bestDist = d; targetX = f.x; targetY = f.y; }
    });

    // Look for smaller snakes to eat
    const mySize = getSnakeSize(snake);
    const allSnakes = [player, ...aiSnakes];
    allSnakes.forEach(other => {
        if (other === snake || !other.alive) return;
        const otherSize = getSnakeSize(other);
        if (mySize > otherSize * 1.3) {
            const oh = other.segments[0];
            const d = Math.hypot(oh.x - head.x, oh.y - head.y);
            if (d < 300 && d < bestDist) { bestDist = d; targetX = oh.x; targetY = oh.y; snake.boosting = d < 150; }
        }
    });

    // Avoid bigger snakes
    allSnakes.forEach(other => {
        if (other === snake || !other.alive) return;
        const otherSize = getSnakeSize(other);
        if (otherSize > mySize * 1.3) {
            const oh = other.segments[0];
            const d = Math.hypot(oh.x - head.x, oh.y - head.y);
            if (d < 200) {
                // Run away
                targetX = head.x - (oh.x - head.x);
                targetY = head.y - (oh.y - head.y);
                snake.boosting = true;
            }
        }
    });

    // Avoid walls (steer towards center if too close to edge)
    if (head.x < 200) targetX = head.x + 200;
    if (head.x > MAP_W - 200) targetX = head.x - 200;
    if (head.y < 200) targetY = head.y + 200;
    if (head.y > MAP_H - 200) targetY = head.y - 200;

    if (targetX !== null) {
        snake.targetAngle = Math.atan2(targetY - head.y, targetX - head.x);
    } else {
        // Wander
        if (Math.random() < 0.02) snake.targetAngle += (Math.random() - 0.5) * 1;
    }

    // Smooth turn
    let diff = snake.targetAngle - snake.angle;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    snake.angle += Math.sign(diff) * Math.min(Math.abs(diff), AI_TURN_SPEED);

    // Boost costs segments
    if (snake.boosting && snake.segments.length > 10) {
        snake.speed = BOOST_SPEED;
        if (animFrame % 10 === 0) {
            snake.segments.pop();
            spawnFoodAt(snake.segments[snake.segments.length - 1].x, snake.segments[snake.segments.length - 1].y, 1);
        }
    } else {
        snake.speed = BASE_SPEED;
        snake.boosting = false;
    }
}

// ===== MOVEMENT =====
function moveSnake(snake) {
    if (!snake.alive) return;
    const head = snake.segments[0];
    const newHead = {
        x: head.x + Math.cos(snake.angle) * snake.speed,
        y: head.y + Math.sin(snake.angle) * snake.speed
    };

    // Wall collision = DEATH
    if (newHead.x < 0 || newHead.x > MAP_W || newHead.y < 0 || newHead.y > MAP_H) {
        if (snake.isPlayer) {
            snake.alive = false;
            state = 'dead';
            if (score > highScore) { highScore = score; localStorage.setItem('snakeArenaHS', highScore); }
            if (navigator.vibrate) navigator.vibrate([100, 50, 200]);
            for (let i = 0; i < 20; i++) particles.push({ x: head.x, y: head.y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1, color: snake.colors[0], size: 5 });
            // Drop food
            const dropCount = Math.min(snake.segments.length, 40);
            for (let i = 0; i < dropCount; i++) {
                const seg = snake.segments[Math.floor(i * snake.segments.length / dropCount)];
                spawnFoodAt(seg.x, seg.y, 1);
            }
            return;
        } else {
            // AI dies on wall, respawn
            snake.alive = false;
            const dropCount = Math.min(snake.segments.length, 30);
            for (let i = 0; i < dropCount; i++) {
                const seg = snake.segments[Math.floor(i * snake.segments.length / dropCount)];
                spawnFoodAt(seg.x, seg.y, 1);
            }
            setTimeout(() => respawnAI(snake), 3000);
            return;
        }
    }

    snake.segments.unshift(newHead);

    // Maintain smooth spacing
    for (let i = 1; i < snake.segments.length; i++) {
        const prev = snake.segments[i - 1];
        const curr = snake.segments[i];
        const dx = curr.x - prev.x, dy = curr.y - prev.y;
        const dist = Math.hypot(dx, dy);
        if (dist > SEG_DIST) {
            const ratio = SEG_DIST / dist;
            curr.x = prev.x + dx * ratio;
            curr.y = prev.y + dy * ratio;
        }
    }

    // Remove excess segments
    while (snake.segments.length > snake.length) snake.segments.pop();
}



// ===== COLLISION =====
function checkEat() {
    const allSnakes = [player, ...aiSnakes];

    allSnakes.forEach(snake => {
        if (!snake.alive) return;
        const head = snake.segments[0];
        const headR = getHeadRadius(snake);

        // Eat food
        for (let i = foods.length - 1; i >= 0; i--) {
            const f = foods[i];
            if (Math.hypot(f.x - head.x, f.y - head.y) < headR + f.size) {
                snake.length += 1;
                foods.splice(i, 1);
                foods.push(spawnFood());
                if (snake.isPlayer) score++;
            }
        }

        // Eat other snakes (head touches their body, and you are bigger)
        allSnakes.forEach(other => {
            if (other === snake || !other.alive) return;
            const mySize = getSnakeSize(snake);
            const otherSize = getSnakeSize(other);

            // Head vs body collision
            for (let i = 5; i < other.segments.length; i++) {
                const seg = other.segments[i];
                const segR = getSegRadius(other);
                const dist = Math.hypot(head.x - seg.x, head.y - seg.y);

                if (dist < headR + segR) {
                    if (mySize > otherSize) {
                        // Eat the other snake!
                        killSnake(other, snake);
                        return;
                    } else if (otherSize > mySize) {
                        // We die!
                        killSnake(snake, other);
                        return;
                    }
                    // Equal size: both bounce off (no kill)
                }
            }

            // Head vs head collision
            const otherHead = other.segments[0];
            if (Math.hypot(head.x - otherHead.x, head.y - otherHead.y) < headR + getHeadRadius(other)) {
                if (mySize > otherSize) { killSnake(other, snake); }
                else if (otherSize > mySize) { killSnake(snake, other); }
                // Equal: nothing happens
            }
        });
    });
}

function killSnake(victim, killer) {
    victim.alive = false;
    // Drop food from body
    const dropCount = Math.min(victim.segments.length, 40);
    for (let i = 0; i < dropCount; i++) {
        const seg = victim.segments[Math.floor(i * victim.segments.length / dropCount)];
        spawnFoodAt(seg.x, seg.y, 2);
    }
    // Killer grows
    killer.length += Math.floor(victim.segments.length * 0.3);
    // Particles
    for (let i = 0; i < 15; i++) {
        particles.push({ x: victim.segments[0].x, y: victim.segments[0].y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, life: 1, color: victim.colors[0], size: 4 + Math.random()*4 });
    }

    if (victim.isPlayer) {
        // Player died
        state = 'dead';
        if (score > highScore) { highScore = score; localStorage.setItem('snakeArenaHS', highScore); }
        if (navigator.vibrate) navigator.vibrate([100, 50, 200]);
    } else if (killer.isPlayer) {
        killCount++;
        score += Math.floor(victim.segments.length / 2);
    }

    // Respawn AI after delay
    if (!victim.isPlayer) {
        setTimeout(() => respawnAI(victim), 3000);
    }
}

function respawnAI(snake) {
    const x = Math.random() * MAP_W;
    const y = Math.random() * MAP_H;
    const len = 15 + Math.floor(Math.random() * 30);
    const si = Math.floor(Math.random() * SKINS.length);
    const newSnake = createSnake(x, y, len, SNAKE_COLORS[si], false, si);
    newSnake.name = snake.name;
    const idx = aiSnakes.indexOf(snake);
    if (idx >= 0) aiSnakes[idx] = newSnake;
}



// ===== INIT =====
function initGame() {
    player = createSnake(MAP_W / 2, MAP_H / 2, 20, SNAKE_COLORS[selectedSkin], true, selectedSkin);
    aiSnakes = [];
    for (let i = 0; i < AI_COUNT; i++) {
        const x = Math.random() * MAP_W;
        const y = Math.random() * MAP_H;
        const len = 15 + Math.floor(Math.random() * 40);
        const si = (i + 1) % SKINS.length;
        aiSnakes.push(createSnake(x, y, len, SNAKE_COLORS[si], false, si));
    }
    foods = [];
    for (let i = 0; i < FOOD_COUNT; i++) foods.push(spawnFood());
    particles = [];
    score = 0; killCount = 0;
    state = 'playing';
}

// ===== UPDATE =====
function update() {
    if (state !== 'playing') return;
    animFrame++;

    // Player controls
    let targetAngle = player.angle;
    if (joystick.active) {
        const len = Math.hypot(joystick.dx, joystick.dy);
        if (len > 10) targetAngle = Math.atan2(joystick.dy, joystick.dx);
    } else if (mouseActive) {
        targetAngle = mouseAngle;
    }

    // Smooth turning
    let diff = targetAngle - player.angle;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    player.angle += Math.sign(diff) * Math.min(Math.abs(diff), TURN_SPEED);

    // Boost
    if (boosting && player.segments.length > 10) {
        player.speed = BOOST_SPEED;
        if (animFrame % 8 === 0) {
            player.length = Math.max(10, player.length - 1);
            player.segments.pop();
            const tail = player.segments[player.segments.length - 1];
            spawnFoodAt(tail.x, tail.y, 1);
        }
    } else {
        player.speed = BASE_SPEED;
    }

    // Move player
    moveSnake(player);

    // Update AI
    aiSnakes.forEach(s => {
        if (s.alive) { updateAI(s); moveSnake(s); }
    });

    // Check collisions
    checkEat();

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vx *= 0.92; p.vy *= 0.92; p.life -= 0.025;
        if (p.life <= 0) particles.splice(i, 1);
    }

    // Camera follows player
    camera.x = player.segments[0].x - W / 2;
    camera.y = player.segments[0].y - H / 2;

    draw();
}



// ===== DRAWING =====
function draw() {
    ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0, 0, W, H);
    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    // Grid
    ctx.strokeStyle = 'rgba(40,40,60,0.4)'; ctx.lineWidth = 1;
    const gs = 60;
    const startX = Math.floor(camera.x / gs) * gs;
    const startY = Math.floor(camera.y / gs) * gs;
    for (let x = startX; x < camera.x + W + gs; x += gs) { ctx.beginPath(); ctx.moveTo(x, camera.y); ctx.lineTo(x, camera.y + H); ctx.stroke(); }
    for (let y = startY; y < camera.y + H + gs; y += gs) { ctx.beginPath(); ctx.moveTo(camera.x, y); ctx.lineTo(camera.x + W, y); ctx.stroke(); }

    // Map border
    ctx.strokeStyle = 'rgba(255,50,50,0.4)'; ctx.lineWidth = 4;
    ctx.strokeRect(0, 0, MAP_W, MAP_H);

    // Food
    foods.forEach(f => {
        if (f.x < camera.x - 50 || f.x > camera.x + W + 50 || f.y < camera.y - 50 || f.y > camera.y + H + 50) return;
        f.pulse += 0.05;
        const pulse = 1 + Math.sin(f.pulse) * 0.2;
        ctx.globalAlpha = 0.3; ctx.fillStyle = f.color;
        ctx.beginPath(); ctx.arc(f.x, f.y, f.size * pulse + 3, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1; ctx.fillStyle = f.color;
        ctx.beginPath(); ctx.arc(f.x, f.y, f.size * pulse, 0, Math.PI * 2); ctx.fill();
    });

    // Draw all snakes
    const allSnakes = [...aiSnakes, player];
    allSnakes.forEach(snake => {
        if (!snake.alive) return;
        drawSnake(snake);
    });

    // Particles
    particles.forEach(p => {
        ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill();
    });
    ctx.globalAlpha = 1;

    ctx.restore();

    // HUD
    drawHUD();
    if (state === 'menu') drawMenu();
    if (state === 'skin') drawSkinSelect();
    if (state === 'dead') drawDead();
}

function drawSnake(snake) {
    const segs = snake.segments;
    const segR = getSegRadius(snake);
    const headR = getHeadRadius(snake);
    const skin = SKINS[snake.skinIdx] || SKINS[0];

    // Draw from tail to head
    for (let i = segs.length - 1; i >= 0; i--) {
        const seg = segs[i];
        const t = i / segs.length;
        const r = i === 0 ? headR : segR * (0.7 + t * 0.3);
        const colorIdx = Math.floor(i / 4) % snake.colors.length;

        if (i === 0) { ctx.shadowColor = skin.glowColor; ctx.shadowBlur = 18; }
        else { ctx.shadowBlur = 0; }

        ctx.globalAlpha = 0.9 + t * 0.1;
        ctx.fillStyle = snake.colors[colorIdx];
        ctx.beginPath(); ctx.arc(seg.x, seg.y, r, 0, Math.PI * 2); ctx.fill();

        // Body patterns
        if (i > 0 && i % 3 === 0) {
            ctx.globalAlpha = 0.4;
            if (skin.bodyPattern === 'scales') {
                ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.arc(seg.x, seg.y, r * 0.6, 0, Math.PI); ctx.stroke();
            } else if (skin.bodyPattern === 'stripes') {
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(seg.x - r, seg.y - 2, r * 2, 4);
            } else if (skin.bodyPattern === 'diamond') {
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath(); ctx.moveTo(seg.x, seg.y - r * 0.5); ctx.lineTo(seg.x + r * 0.4, seg.y); ctx.lineTo(seg.x, seg.y + r * 0.5); ctx.lineTo(seg.x - r * 0.4, seg.y); ctx.fill();
            } else if (skin.bodyPattern === 'crystals') {
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.beginPath(); ctx.moveTo(seg.x, seg.y - r * 0.6); ctx.lineTo(seg.x + r * 0.3, seg.y); ctx.lineTo(seg.x - r * 0.3, seg.y); ctx.fill();
            } else if (skin.bodyPattern === 'electric') {
                ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(seg.x - r, seg.y); ctx.lineTo(seg.x - r*0.3, seg.y - r*0.4); ctx.lineTo(seg.x + r*0.3, seg.y + r*0.4); ctx.lineTo(seg.x + r, seg.y); ctx.stroke();
            } else if (skin.bodyPattern === 'stars') {
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.beginPath(); ctx.arc(seg.x + (Math.sin(i)*r*0.3), seg.y + (Math.cos(i)*r*0.3), 1.5, 0, Math.PI * 2); ctx.fill();
            } else if (skin.bodyPattern === 'bubbles') {
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath(); ctx.arc(seg.x + Math.sin(i*2)*r*0.4, seg.y + Math.cos(i*2)*r*0.4, r * 0.2, 0, Math.PI * 2); ctx.fill();
            } else if (skin.bodyPattern === 'lava') {
                ctx.fillStyle = 'rgba(255,200,0,0.4)';
                ctx.beginPath(); ctx.arc(seg.x, seg.y, r * 0.4, 0, Math.PI * 2); ctx.fill();
            } else if (skin.bodyPattern === 'fade') {
                ctx.globalAlpha = 0.15 + t * 0.3;
            } else if (skin.bodyPattern === 'smoke') {
                ctx.fillStyle = 'rgba(200,100,255,0.2)';
                ctx.beginPath(); ctx.arc(seg.x + Math.sin(animFrame*0.05+i)*5, seg.y + Math.cos(animFrame*0.05+i)*5, r * 0.8, 0, Math.PI * 2); ctx.fill();
            }
            ctx.globalAlpha = 1;
        }
    }
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;

    // HEAD DECORATIONS based on skin type
    const head = segs[0];
    const a = snake.angle;

    // Dragon horns
    if (skin.headShape === 'horns' || skin.headShape === 'crown') {
        ctx.fillStyle = skin.headShape === 'crown' ? '#ffd600' : snake.colors[0];
        const hornLen = headR * 0.8;
        // Left horn
        ctx.beginPath();
        ctx.moveTo(head.x + Math.cos(a - 0.8) * headR * 0.6, head.y + Math.sin(a - 0.8) * headR * 0.6);
        ctx.lineTo(head.x + Math.cos(a - 0.4) * (headR + hornLen), head.y + Math.sin(a - 0.4) * (headR + hornLen));
        ctx.lineTo(head.x + Math.cos(a - 0.2) * headR * 0.8, head.y + Math.sin(a - 0.2) * headR * 0.8);
        ctx.fill();
        // Right horn
        ctx.beginPath();
        ctx.moveTo(head.x + Math.cos(a + 0.8) * headR * 0.6, head.y + Math.sin(a + 0.8) * headR * 0.6);
        ctx.lineTo(head.x + Math.cos(a + 0.4) * (headR + hornLen), head.y + Math.sin(a + 0.4) * (headR + hornLen));
        ctx.lineTo(head.x + Math.cos(a + 0.2) * headR * 0.8, head.y + Math.sin(a + 0.2) * headR * 0.8);
        ctx.fill();
        if (skin.headShape === 'crown') {
            // Middle crown spike
            ctx.beginPath();
            ctx.moveTo(head.x + Math.cos(a) * headR * 0.7, head.y + Math.sin(a) * headR * 0.7);
            ctx.lineTo(head.x + Math.cos(a) * (headR + hornLen * 1.2), head.y + Math.sin(a) * (headR + hornLen * 1.2));
            ctx.lineTo(head.x + Math.cos(a + 0.15) * headR * 0.8, head.y + Math.sin(a + 0.15) * headR * 0.8);
            ctx.fill();
        }
    }

    // Cobra hood
    if (skin.headShape === 'hood') {
        ctx.fillStyle = snake.colors[1];
        ctx.globalAlpha = 0.7;
        ctx.beginPath();
        ctx.ellipse(head.x - Math.cos(a) * 3, head.y - Math.sin(a) * 3, headR * 1.6, headR * 1.2, a, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        // Hood pattern
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.beginPath(); ctx.arc(head.x - Math.cos(a)*4, head.y - Math.sin(a)*4, headR * 0.5, 0, Math.PI * 2); ctx.fill();
    }

    // Viper head (triangular)
    if (skin.headShape === 'viper') {
        ctx.fillStyle = snake.colors[0];
        ctx.beginPath();
        ctx.moveTo(head.x + Math.cos(a) * headR * 1.4, head.y + Math.sin(a) * headR * 1.4);
        ctx.lineTo(head.x + Math.cos(a - 1.2) * headR, head.y + Math.sin(a - 1.2) * headR);
        ctx.lineTo(head.x + Math.cos(a + 1.2) * headR, head.y + Math.sin(a + 1.2) * headR);
        ctx.fill();
    }

    // Bolt (electric)
    if (skin.headShape === 'bolt') {
        ctx.fillStyle = '#fff';
        ctx.strokeStyle = '#ffeb3b'; ctx.lineWidth = 2;
        const boltLen = headR * 1.2;
        ctx.beginPath();
        ctx.moveTo(head.x + Math.cos(a) * boltLen, head.y + Math.sin(a) * boltLen);
        ctx.lineTo(head.x + Math.cos(a + 0.5) * boltLen * 0.5, head.y + Math.sin(a + 0.5) * boltLen * 0.5);
        ctx.lineTo(head.x + Math.cos(a) * boltLen * 0.7, head.y + Math.sin(a) * boltLen * 0.7);
        ctx.stroke();
    }

    // Ghost (wavy tail-like head)
    if (skin.headShape === 'ghost') {
        ctx.globalAlpha = 0.5 + Math.sin(animFrame * 0.1) * 0.2;
        ctx.fillStyle = snake.colors[0];
        ctx.beginPath(); ctx.arc(head.x, head.y, headR * 1.3, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
    }

    // Rock (lava cracks)
    if (skin.headShape === 'rock') {
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.beginPath(); ctx.arc(head.x, head.y, headR * 0.9, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#ffd600'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(head.x - headR * 0.3, head.y); ctx.lineTo(head.x + headR * 0.3, head.y + headR * 0.2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(head.x, head.y - headR * 0.4); ctx.lineTo(head.x + headR * 0.2, head.y + headR * 0.3); ctx.stroke();
    }

    // Cosmic ring
    if (skin.headShape === 'cosmic') {
        ctx.strokeStyle = 'rgba(234,128,252,0.5)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.ellipse(head.x, head.y, headR * 1.5, headR * 0.5, a + animFrame * 0.03, 0, Math.PI * 2); ctx.stroke();
    }

    // Fangs (toxic)
    if (skin.headShape === 'fangs') {
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.moveTo(head.x + Math.cos(a - 0.3) * headR, head.y + Math.sin(a - 0.3) * headR);
        ctx.lineTo(head.x + Math.cos(a - 0.15) * (headR + 8), head.y + Math.sin(a - 0.15) * (headR + 8));
        ctx.lineTo(head.x + Math.cos(a) * headR, head.y + Math.sin(a) * headR);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(head.x + Math.cos(a + 0.3) * headR, head.y + Math.sin(a + 0.3) * headR);
        ctx.lineTo(head.x + Math.cos(a + 0.15) * (headR + 8), head.y + Math.sin(a + 0.15) * (headR + 8));
        ctx.lineTo(head.x + Math.cos(a) * headR, head.y + Math.sin(a) * headR);
        ctx.fill();
    }

    // Eyes
    const eyeOff = headR * 0.4;
    const eyeAngle1 = a - 0.5;
    const eyeAngle2 = a + 0.5;
    ctx.fillStyle = skin.eyeColor;
    ctx.beginPath(); ctx.arc(head.x + Math.cos(eyeAngle1) * eyeOff, head.y + Math.sin(eyeAngle1) * eyeOff, headR * 0.28, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(head.x + Math.cos(eyeAngle2) * eyeOff, head.y + Math.sin(eyeAngle2) * eyeOff, headR * 0.28, 0, Math.PI * 2); ctx.fill();
    // Pupils (slit for dragon/viper, round for others)
    ctx.fillStyle = '#111';
    const pupilW = (skin.type === 'dragon' || skin.type === 'viper' || skin.type === 'cobra') ? headR * 0.08 : headR * 0.14;
    const pupilH = headR * 0.18;
    ctx.beginPath(); ctx.ellipse(head.x + Math.cos(eyeAngle1) * eyeOff + Math.cos(a)*2, head.y + Math.sin(eyeAngle1) * eyeOff + Math.sin(a)*2, pupilW, pupilH, a, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(head.x + Math.cos(eyeAngle2) * eyeOff + Math.cos(a)*2, head.y + Math.sin(eyeAngle2) * eyeOff + Math.sin(a)*2, pupilW, pupilH, a, 0, Math.PI*2); ctx.fill();
    // Pupils
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(head.x + Math.cos(eyeAngle1) * eyeOff + Math.cos(snake.angle) * 2, head.y + Math.sin(eyeAngle1) * eyeOff + Math.sin(snake.angle) * 2, headR * 0.15, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(head.x + Math.cos(eyeAngle2) * eyeOff + Math.cos(snake.angle) * 2, head.y + Math.sin(eyeAngle2) * eyeOff + Math.sin(snake.angle) * 2, headR * 0.15, 0, Math.PI * 2); ctx.fill();

    // Name tag
    ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(snake.name + ' (' + snake.segments.length + ')', head.x, head.y - headR - 10);

    // Size comparison indicator for player
    if (!snake.isPlayer && player.alive) {
        const mySize = getSnakeSize(player);
        const theirSize = getSnakeSize(snake);
        if (mySize > theirSize) {
            ctx.fillStyle = 'rgba(0,230,118,0.6)'; ctx.font = 'bold 10px sans-serif';
            ctx.fillText('MAKAN!', head.x, head.y - headR - 22);
        } else if (theirSize > mySize) {
            ctx.fillStyle = 'rgba(255,23,68,0.6)'; ctx.font = 'bold 10px sans-serif';
            ctx.fillText('BAHAYA!', head.x, head.y - headR - 22);
        }
    }
}



function drawHUD() {
    // Score & length
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    roundRect(15, 15, 160, 55, 12); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText('Panjang: ' + player.segments.length, 30, 33);
    ctx.fillStyle = '#ffd600'; ctx.font = '12px sans-serif';
    ctx.fillText('Skor: ' + score + ' | Kill: ' + killCount, 30, 52);

    // Leaderboard
    const allSnakes = [player, ...aiSnakes].filter(s => s.alive).sort((a, b) => getSnakeSize(b) - getSnakeSize(a));
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    roundRect(W - 160, 15, 145, 30 + allSnakes.slice(0, 5).length * 18, 10); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText('LEADERBOARD', W - 25, 32);
    allSnakes.slice(0, 5).forEach((s, i) => {
        ctx.fillStyle = s.colors[0]; ctx.font = '11px sans-serif';
        ctx.fillText((i + 1) + '. ' + s.name + ' (' + s.segments.length + ')', W - 25, 50 + i * 18);
    });

    // Boost indicator
    if (player.alive) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        roundRect(W / 2 - 60, H - 50, 120, 30, 10); ctx.fill();
        ctx.fillStyle = boosting ? '#ff5252' : '#aaa'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(boosting ? 'BOOST ON!' : 'Hold = Boost', W / 2, H - 35);
    }

    // Minimap
    const mmW = 120, mmH = 120;
    const mmX = W - mmW - 15, mmY = H - mmH - 15;
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(mmX, mmY, mmW, mmH);
    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1; ctx.strokeRect(mmX, mmY, mmW, mmH);
    // Food dots
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    foods.forEach(f => {
        const fx = mmX + (f.x / MAP_W) * mmW;
        const fy = mmY + (f.y / MAP_H) * mmH;
        ctx.fillRect(fx, fy, 1, 1);
    });
    // Snakes on minimap
    const allS = [player, ...aiSnakes];
    allS.forEach(s => {
        if (!s.alive) return;
        const h = s.segments[0];
        const sx = mmX + (h.x / MAP_W) * mmW;
        const sy = mmY + (h.y / MAP_H) * mmH;
        ctx.fillStyle = s.colors[0];
        ctx.beginPath(); ctx.arc(sx, sy, s.isPlayer ? 4 : 3, 0, Math.PI * 2); ctx.fill();
    });
}

function drawMenu() {
    ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#00e676'; ctx.font = 'bold 44px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#00e676'; ctx.shadowBlur = 20;
    ctx.fillText('SNAKE ARENA', W / 2, H / 2 - 120);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#aaa'; ctx.font = '16px sans-serif';
    ctx.fillText('Makan ular lain yang lebih kecil!', W / 2, H / 2 - 75);
    ctx.fillStyle = '#666'; ctx.font = '13px sans-serif';
    ctx.fillText('Nabrak dinding = MATI! Ular lebih kecil = MAKAN!', W / 2, H / 2 - 50);

    // Skin preview
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; roundRect(W / 2 - 80, H / 2 - 38, 160, 30, 10); ctx.fill();
    ctx.fillStyle = SNAKE_COLORS[selectedSkin][0]; ctx.font = 'bold 13px sans-serif';
    ctx.fillText('Skin: ' + SKIN_NAMES[selectedSkin], W / 2, H / 2 - 23);

    // Start btn
    ctx.shadowColor = '#00e676'; ctx.shadowBlur = 15; ctx.fillStyle = '#00e676';
    roundRect(W / 2 - 100, H / 2 + 0, 200, 50, 28); ctx.fill(); ctx.shadowBlur = 0;
    ctx.fillStyle = '#000'; ctx.font = 'bold 20px sans-serif';
    ctx.fillText('MAIN!', W / 2, H / 2 + 25);

    // Skin button
    ctx.shadowColor = '#e040fb'; ctx.shadowBlur = 10; ctx.fillStyle = '#e040fb';
    roundRect(W / 2 - 100, H / 2 + 65, 200, 45, 22); ctx.fill(); ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff'; ctx.font = 'bold 16px sans-serif';
    ctx.fillText('PILIH SKIN', W / 2, H / 2 + 88);

    ctx.fillStyle = '#555'; ctx.font = '12px sans-serif';
    ctx.fillText('Mouse/Swipe = arah | Hold/2 jari = boost', W / 2, H / 2 + 130);
    if (highScore > 0) { ctx.fillStyle = '#ffd600'; ctx.font = 'bold 14px sans-serif'; ctx.fillText('Best: ' + highScore, W / 2, H / 2 + 155); }
}

function drawSkinSelect() {
    ctx.fillStyle = 'rgba(0,0,0,0.92)'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#e040fb'; ctx.font = 'bold 32px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('PILIH SKIN', W / 2, 50);

    // Grid of skins
    const cols = Math.min(4, Math.floor((W - 30) / 150));
    const rows = Math.ceil(SKINS.length / cols);
    const cellW = 140, cellH = 100;
    const startX = W / 2 - (cols * cellW) / 2;
    const startY = 90;

    SKINS.forEach((skin, i) => {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const cx = startX + col * cellW + cellW / 2;
        const cy = startY + row * (cellH + 8) + cellH / 2;

        const isSelected = i === selectedSkin;
        ctx.fillStyle = isSelected ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.04)';
        ctx.strokeStyle = isSelected ? skin.glowColor : 'rgba(255,255,255,0.1)';
        ctx.lineWidth = isSelected ? 3 : 1;
        if (isSelected) { ctx.shadowColor = skin.glowColor; ctx.shadowBlur = 12; }
        roundRect(cx - cellW / 2 + 5, cy - cellH / 2, cellW - 10, cellH, 14);
        ctx.fill(); ctx.stroke(); ctx.shadowBlur = 0;

        // Snake body preview
        for (let j = 5; j >= 0; j--) {
            const sx = cx - 25 + j * 10;
            const sy = cy - 8;
            const r = j === 0 ? 10 : 7;
            ctx.fillStyle = skin.colors[j % skin.colors.length];
            if (j === 0) { ctx.shadowColor = skin.glowColor; ctx.shadowBlur = 10; }
            ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
        }

        // Head decoration preview
        const hx = cx - 25, hy = cy - 8;
        if (skin.headShape === 'horns' || skin.headShape === 'crown') {
            ctx.fillStyle = skin.headShape === 'crown' ? '#ffd600' : skin.colors[0];
            ctx.beginPath(); ctx.moveTo(hx - 5, hy - 10); ctx.lineTo(hx - 2, hy - 18); ctx.lineTo(hx + 1, hy - 10); ctx.fill();
            ctx.beginPath(); ctx.moveTo(hx + 5, hy - 10); ctx.lineTo(hx + 8, hy - 18); ctx.lineTo(hx + 11, hy - 10); ctx.fill();
        } else if (skin.headShape === 'hood') {
            ctx.fillStyle = skin.colors[1]; ctx.globalAlpha = 0.5;
            ctx.beginPath(); ctx.ellipse(hx, hy, 16, 12, 0, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 1;
        } else if (skin.headShape === 'fangs') {
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.moveTo(hx + 10, hy + 3); ctx.lineTo(hx + 13, hy + 12); ctx.lineTo(hx + 8, hy + 5); ctx.fill();
            ctx.beginPath(); ctx.moveTo(hx + 10, hy - 3); ctx.lineTo(hx + 13, hy - 12); ctx.lineTo(hx + 8, hy - 5); ctx.fill();
        }

        // Eyes
        ctx.fillStyle = skin.eyeColor;
        ctx.beginPath(); ctx.arc(hx + 3, hy - 4, 3, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(hx + 3, hy + 4, 3, 0, Math.PI * 2); ctx.fill();

        // Name
        ctx.fillStyle = skin.glowColor; ctx.font = 'bold 11px sans-serif';
        ctx.fillText(skin.name, cx, cy + 30);

        if (isSelected) {
            ctx.fillStyle = '#fff'; ctx.font = 'bold 9px sans-serif';
            ctx.fillText('✓ TERPILIH', cx, cy + 43);
        }
    });

    // OKE button
    const btnY = startY + rows * (cellH + 8) + 15;
    ctx.shadowColor = '#00e676'; ctx.shadowBlur = 12; ctx.fillStyle = '#00e676';
    roundRect(W / 2 - 80, btnY, 160, 45, 22); ctx.fill(); ctx.shadowBlur = 0;
    ctx.fillStyle = '#000'; ctx.font = 'bold 18px sans-serif';
    ctx.fillText('OKE!', W / 2, btnY + 22);
}

function drawDead() {
    ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ff1744'; ctx.font = 'bold 40px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('DIMAKAN!', W / 2, H / 2 - 70);
    ctx.fillStyle = '#fff'; ctx.font = '20px sans-serif';
    ctx.fillText('Skor: ' + score + ' | Kill: ' + killCount + ' | Panjang: ' + player.segments.length, W / 2, H / 2 - 25);
    if (score >= highScore && score > 0) { ctx.fillStyle = '#ffd600'; ctx.font = 'bold 16px sans-serif'; ctx.fillText('REKOR BARU!', W / 2, H / 2 + 5); }
    ctx.shadowColor = '#00e676'; ctx.shadowBlur = 15; ctx.fillStyle = '#00e676';
    roundRect(W / 2 - 100, H / 2 + 25, 200, 55, 28); ctx.fill(); ctx.shadowBlur = 0;
    ctx.fillStyle = '#000'; ctx.font = 'bold 20px sans-serif';
    ctx.fillText('MAIN LAGI', W / 2, H / 2 + 53);
}

function roundRect(x, y, w, h, r) {
    ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r); ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h); ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r); ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y); ctx.closePath();
}



// ===== INPUT =====
// Mouse
canvas.addEventListener('mousemove', e => {
    mouseActive = true;
    mouseAngle = Math.atan2(e.clientY - H / 2, e.clientX - W / 2);
});
canvas.addEventListener('mousedown', e => { boosting = true; });
canvas.addEventListener('mouseup', e => { boosting = false; });

// Touch joystick
canvas.addEventListener('touchstart', e => {
    const t = e.touches[0];
    if (state === 'menu') {
        // Start btn
        if (t.clientX > W / 2 - 100 && t.clientX < W / 2 + 100 && t.clientY > H / 2 && t.clientY < H / 2 + 50) { initGame(); }
        // Skin btn
        else if (t.clientX > W / 2 - 100 && t.clientX < W / 2 + 100 && t.clientY > H / 2 + 65 && t.clientY < H / 2 + 110) { state = 'skin'; }
    } else if (state === 'skin') {
        handleSkinClick(t.clientX, t.clientY);
    } else if (state === 'dead') {
        const by = H / 2 + 25;
        if (t.clientX > W / 2 - 100 && t.clientX < W / 2 + 100 && t.clientY > by && t.clientY < by + 55) { initGame(); }
    } else {
        joystick.active = true; joystick.startX = t.clientX; joystick.startY = t.clientY;
        joystick.dx = 0; joystick.dy = 0; joystick.id = t.identifier;
        if (e.touches.length >= 2) boosting = true;
    }
    e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
    for (const t of e.changedTouches) {
        if (t.identifier === joystick.id) {
            joystick.dx = t.clientX - joystick.startX;
            joystick.dy = t.clientY - joystick.startY;
        }
    }
    if (e.touches.length >= 2) boosting = true;
    else boosting = false;
    e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', e => {
    if (e.touches.length === 0) { joystick.active = false; boosting = false; }
    else if (e.touches.length < 2) boosting = false;
    e.preventDefault();
}, { passive: false });

// Click for menu
canvas.addEventListener('click', e => {
    if (state === 'menu') {
        if (e.clientX > W / 2 - 100 && e.clientX < W / 2 + 100 && e.clientY > H / 2 && e.clientY < H / 2 + 50) initGame();
        else if (e.clientX > W / 2 - 100 && e.clientX < W / 2 + 100 && e.clientY > H / 2 + 65 && e.clientY < H / 2 + 110) { state = 'skin'; }
    }
    if (state === 'skin') { handleSkinClick(e.clientX, e.clientY); }
    if (state === 'dead') { const by = H / 2 + 25; if (e.clientX > W / 2 - 100 && e.clientX < W / 2 + 100 && e.clientY > by && e.clientY < by + 55) initGame(); }
});

function handleSkinClick(mx, my) {
    const cols = Math.min(4, Math.floor((W - 30) / 150));
    const rows = Math.ceil(SKINS.length / cols);
    const cellW = 140, cellH = 100;
    const startX = W / 2 - (cols * cellW) / 2;
    const startY = 90;

    // Check skin cards
    SKINS.forEach((skin, i) => {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const cx = startX + col * cellW + cellW / 2;
        const cy = startY + row * (cellH + 8) + cellH / 2;
        if (mx > cx - cellW / 2 + 5 && mx < cx + cellW / 2 - 5 && my > cy - cellH / 2 && my < cy + cellH / 2) {
            selectedSkin = i;
            localStorage.setItem('snakeSkin', i);
        }
    });

    // Check OKE button
    const btnY = startY + rows * (cellH + 8) + 15;
    if (mx > W / 2 - 80 && mx < W / 2 + 80 && my > btnY && my < btnY + 45) {
        state = 'menu';
    }
}

// ===== GAME LOOP =====
function gameLoop() {
    requestAnimationFrame(gameLoop);
    if (state === 'playing') update();
    else { animFrame++; draw(); }
}

// Start
state = 'menu';
player = createSnake(MAP_W / 2, MAP_H / 2, 20, SNAKE_COLORS[0], true);
aiSnakes = []; foods = []; particles = [];
score = 0; killCount = 0;
requestAnimationFrame(gameLoop);
</script>
