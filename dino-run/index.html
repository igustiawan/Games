<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dino Run!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; overflow: hidden; touch-action: none; background: #1a1a2e; }
        body { display: flex; align-items: center; justify-content: center; font-family: -apple-system, sans-serif; min-height: 100dvh; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// ===== CONFIG =====
let state = 'menu';
let dino, obstacles, coins, particles, clouds, bgItems;
let score, highScore, coinCount, speed, distance, groundY;
let animFrame = 0, screenShake = 0;
let lives = 3;

highScore = parseInt(localStorage.getItem('dinoHS2') || '0');

// Easier settings
const GRAVITY = 0.5;
const JUMP_FORCE = -12;
const DOUBLE_JUMP_FORCE = -10;
const BASE_SPEED = 5;
const GROUND_OFFSET = 90;

// Obstacle types (Mario-style)
const OBS_TYPES = [
    { type: 'goomba', w: 35, h: 35, color: '#8d6e63' },
    { type: 'pipe_small', w: 40, h: 50, color: '#4caf50' },
    { type: 'pipe_big', w: 45, h: 70, color: '#388e3c' },
    { type: 'bat', w: 30, h: 25, color: '#7c4dff', flying: true },
    { type: 'spiky', w: 30, h: 30, color: '#ff5722' },
];




// ===== INIT =====
function initGame() {
    groundY = H - GROUND_OFFSET;
    dino = { x: 100, y: groundY - 55, vy: 0, w: 45, h: 55, jumping: false, doubleJumped: false, ducking: false, invincible: 0, runFrame: 0 };
    obstacles = []; coins = []; particles = []; clouds = []; bgItems = [];
    score = 0; coinCount = 0; speed = BASE_SPEED; distance = 0; lives = 3;
    screenShake = 0; animFrame = 0;
    for (let i = 0; i < 5; i++) clouds.push({ x: Math.random()*W, y: 30+Math.random()*120, w: 60+Math.random()*80, speed: 0.3+Math.random()*0.5 });
    for (let i = 0; i < 8; i++) bgItems.push({ x: Math.random()*W, y: groundY+10+Math.random()*40, size: 3+Math.random()*6, color: `hsl(${120+Math.random()*40},40%,30%)` });
    state = 'playing';
}

function jump() {
    if (state !== 'playing') { initGame(); return; }
    if (dino.ducking) { dino.ducking = false; dino.h = 55; return; }
    if (!dino.jumping) {
        dino.vy = JUMP_FORCE; dino.jumping = true; dino.doubleJumped = false;
        spawnParticles(dino.x + dino.w/2, groundY, '#aaa', 4);
    } else if (!dino.doubleJumped) {
        dino.vy = DOUBLE_JUMP_FORCE; dino.doubleJumped = true;
        spawnParticles(dino.x + dino.w/2, dino.y + dino.h, '#64ffda', 4);
    }
}

function duck(on) {
    if (state !== 'playing') return;
    dino.ducking = on;
    dino.h = on && !dino.jumping ? 35 : 55;
}

function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) particles.push({ x, y, vx: (Math.random()-0.5)*5, vy: -Math.random()*3-1, life: 1, color, size: 2+Math.random()*3 });
}

function spawnObstacle() {
    // Easier: less flying, more ground
    const pool = speed < 8 ? OBS_TYPES.slice(0, 3) : OBS_TYPES;
    const type = pool[Math.floor(Math.random() * pool.length)];
    const obs = { ...type, x: W + 50, scored: false };
    obs.y = type.flying ? groundY - 55 - Math.random()*40 : groundY - type.h;
    obstacles.push(obs);
}

function spawnCoin() {
    const y = groundY - 60 - Math.random() * 80;
    coins.push({ x: W + 50, y, pulse: Math.random()*Math.PI*2 });
}



// ===== UPDATE =====
function update() {
    if (state !== 'playing') return;
    animFrame++;
    distance += speed;
    score = Math.floor(distance / 10) + coinCount * 5;

    // Speed increases slowly (easier)
    speed = BASE_SPEED + distance / 4000;

    // Physics (lighter gravity = easier jumps)
    dino.vy += GRAVITY;
    dino.y += dino.vy;
    if (dino.y >= groundY - dino.h) {
        dino.y = groundY - dino.h; dino.vy = 0;
        dino.jumping = false; dino.doubleJumped = false;
    }
    dino.runFrame += 0.12;
    if (dino.invincible > 0) dino.invincible--;
    if (screenShake > 0) screenShake--;

    // Spawn obstacles (less frequent = easier)
    const lastObs = obstacles[obstacles.length - 1];
    const minGap = 350; // Bigger gap = easier
    if (!lastObs || lastObs.x < W - minGap) {
        if (Math.random() < 0.02 + speed * 0.003) spawnObstacle();
    }

    // Spawn coins
    if (Math.random() < 0.02) spawnCoin();

    // Update obstacles
    for (let i = obstacles.length - 1; i >= 0; i--) {
        const o = obstacles[i]; o.x -= speed;
        if (o.x + o.w < 0) { obstacles.splice(i, 1); continue; }
        if (!o.scored && o.x + o.w < dino.x) { o.scored = true; score += 5; }
        // Collision (generous hitbox = easier)
        if (checkHit(dino, o) && dino.invincible <= 0) {
            lives--;
            dino.invincible = 90; // Long invincibility
            screenShake = 10;
            spawnParticles(dino.x + dino.w/2, dino.y + dino.h/2, '#ff1744', 8);
            if (navigator.vibrate) navigator.vibrate(100);
            obstacles.splice(i, 1);
            if (lives <= 0) { die(); return; }
        }
    }

    // Update coins
    for (let i = coins.length - 1; i >= 0; i--) {
        const c = coins[i]; c.x -= speed; c.pulse += 0.08;
        if (c.x < -30) { coins.splice(i, 1); continue; }
        if (Math.abs(c.x - dino.x - dino.w/2) < 35 && Math.abs(c.y - dino.y - dino.h/2) < 40) {
            coinCount++; spawnParticles(c.x, c.y, '#ffd600', 5);
            coins.splice(i, 1);
        }
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life -= 0.03;
        if (p.life <= 0) particles.splice(i, 1);
    }

    // Clouds & bg
    clouds.forEach(c => { c.x -= c.speed; if (c.x + c.w < 0) { c.x = W + 50; c.y = 30+Math.random()*120; } });
    bgItems.forEach(b => { b.x -= speed * 0.3; if (b.x < -20) b.x = W + 20; });

    draw();
}

function checkHit(d, o) {
    const shrink = 12; // Very forgiving hitbox
    return d.x + shrink < o.x + o.w && d.x + d.w - shrink > o.x && d.y + shrink < o.y + o.h && d.y + d.h - shrink > o.y;
}

function die() {
    state = 'dead';
    if (score > highScore) { highScore = score; localStorage.setItem('dinoHS2', highScore); }
    spawnParticles(dino.x + dino.w/2, dino.y + dino.h/2, '#ff1744', 15);
    if (navigator.vibrate) navigator.vibrate([100, 50, 150]);
}



// ===== DRAWING =====
function draw() {
    const shake = screenShake > 0 ? (Math.random()-0.5)*screenShake*0.8 : 0;
    ctx.save(); ctx.translate(shake, shake*0.3);

    // Sky (colorful gradient like Mario)
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#1a237e');
    grad.addColorStop(0.6, '#303f9f');
    grad.addColorStop(1, '#5c6bc0');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

    // Stars
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    for (let i = 0; i < 20; i++) {
        const sx = (i * 97 + animFrame * 0.05) % W;
        const sy = (i * 53) % (groundY - 50);
        ctx.beginPath(); ctx.arc(sx, sy, 1 + (i%3)*0.5, 0, Math.PI*2); ctx.fill();
    }

    // Clouds (cute puffy)
    clouds.forEach(c => {
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.beginPath(); ctx.ellipse(c.x+c.w/2, c.y, c.w/2, 18, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(c.x+c.w*0.3, c.y-8, c.w*0.25, 14, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(c.x+c.w*0.7, c.y-5, c.w*0.2, 12, 0, 0, Math.PI*2); ctx.fill();
    });

    // Ground (Mario-style green+brown)
    ctx.fillStyle = '#4caf50'; ctx.fillRect(0, groundY, W, 12);
    ctx.fillStyle = '#795548'; ctx.fillRect(0, groundY+12, W, H-groundY-12);
    // Ground blocks pattern
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    for (let x = -(distance*0.5 % 40); x < W; x += 40) { ctx.fillRect(x, groundY+12, 38, 38); }
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    for (let x = -(distance*0.5 % 40)+2; x < W; x += 40) { ctx.fillRect(x, groundY+14, 16, 16); }

    // BG bushes
    bgItems.forEach(b => {
        ctx.fillStyle = b.color;
        ctx.beginPath(); ctx.ellipse(b.x, b.y, b.size, b.size*0.7, 0, 0, Math.PI*2); ctx.fill();
    });

    // Coins
    coins.forEach(c => {
        const pulse = 1 + Math.sin(c.pulse)*0.15;
        ctx.fillStyle = '#ffd600'; ctx.shadowColor = '#ffd600'; ctx.shadowBlur = 8;
        ctx.beginPath(); ctx.ellipse(c.x, c.y, 10*pulse, 12*pulse, 0, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#ff8f00'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('$', c.x, c.y);
    });

    // Obstacles (Mario-style)
    obstacles.forEach(o => drawObstacle(o));

    // Dino (Mario-style character)
    drawDino();

    // Particles
    particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2); ctx.fill(); });
    ctx.globalAlpha = 1;

    ctx.restore();
    drawHUD();
    if (state === 'menu') drawMenu();
    if (state === 'dead') drawDead();
}

function drawObstacle(o) {
    if (o.type === 'goomba') {
        // Cute mushroom enemy
        ctx.fillStyle = '#8d6e63';
        ctx.beginPath(); ctx.ellipse(o.x+o.w/2, o.y+o.h*0.6, o.w/2, o.h*0.4, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#5d4037';
        ctx.beginPath(); ctx.ellipse(o.x+o.w/2, o.y+o.h*0.35, o.w*0.55, o.h*0.35, 0, 0, Math.PI*2); ctx.fill();
        // Eyes (angry)
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.ellipse(o.x+o.w*0.35, o.y+o.h*0.45, 5, 6, -0.2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(o.x+o.w*0.65, o.y+o.h*0.45, 5, 6, 0.2, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(o.x+o.w*0.35, o.y+o.h*0.47, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(o.x+o.w*0.65, o.y+o.h*0.47, 2.5, 0, Math.PI*2); ctx.fill();
        // Feet
        ctx.fillStyle = '#4e342e';
        ctx.fillRect(o.x+5, o.y+o.h-8, 10, 8);
        ctx.fillRect(o.x+o.w-15, o.y+o.h-8, 10, 8);
    } else if (o.type === 'pipe_small' || o.type === 'pipe_big') {
        // Mario pipe
        ctx.fillStyle = o.color;
        ctx.fillRect(o.x+4, o.y+15, o.w-8, o.h-15);
        ctx.fillStyle = o.type === 'pipe_big' ? '#2e7d32' : '#388e3c';
        ctx.fillRect(o.x, o.y, o.w, 18);
        // Highlight
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(o.x+6, o.y+18, 8, o.h-20);
        // Dark side
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fillRect(o.x+o.w-14, o.y+18, 8, o.h-20);
    } else if (o.type === 'bat') {
        // Flying bat
        const wingFlap = Math.sin(animFrame*0.3)*0.4;
        ctx.fillStyle = '#7c4dff';
        ctx.beginPath(); ctx.ellipse(o.x+o.w/2, o.y+o.h/2, o.w/2, o.h/2, 0, 0, Math.PI*2); ctx.fill();
        // Wings
        ctx.fillStyle = '#6200ea';
        ctx.beginPath();
        ctx.ellipse(o.x-5, o.y+o.h/2, 12, 8+wingFlap*10, wingFlap-0.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath();
        ctx.ellipse(o.x+o.w+5, o.y+o.h/2, 12, 8+wingFlap*10, -wingFlap+0.5, 0, Math.PI*2); ctx.fill();
        // Eyes
        ctx.fillStyle = '#ff1744';
        ctx.beginPath(); ctx.arc(o.x+o.w*0.35, o.y+o.h*0.4, 3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(o.x+o.w*0.65, o.y+o.h*0.4, 3, 0, Math.PI*2); ctx.fill();
    } else if (o.type === 'spiky') {
        // Spiky shell (koopa-like)
        ctx.fillStyle = '#ff5722';
        ctx.beginPath(); ctx.arc(o.x+o.w/2, o.y+o.h/2, o.w/2, 0, Math.PI*2); ctx.fill();
        // Spikes
        ctx.fillStyle = '#bf360c';
        for (let i = 0; i < 6; i++) {
            const a = (Math.PI*2/6)*i + animFrame*0.02;
            ctx.beginPath();
            ctx.moveTo(o.x+o.w/2 + Math.cos(a)*o.w/2, o.y+o.h/2 + Math.sin(a)*o.w/2);
            ctx.lineTo(o.x+o.w/2 + Math.cos(a)*(o.w/2+8), o.y+o.h/2 + Math.sin(a)*(o.w/2+8));
            ctx.lineTo(o.x+o.w/2 + Math.cos(a+0.3)*o.w/2, o.y+o.h/2 + Math.sin(a+0.3)*o.w/2);
            ctx.fill();
        }
    } else {
        // Fireball
        ctx.fillStyle = '#ff5722'; ctx.shadowColor = '#ff5722'; ctx.shadowBlur = 10;
        ctx.beginPath(); ctx.arc(o.x+o.w/2, o.y+o.h/2, o.w/2, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#ffd600';
        ctx.beginPath(); ctx.arc(o.x+o.w/2, o.y+o.h/2, o.w/3, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
    }
}



function drawDino() {
    const flash = dino.invincible > 0 && Math.floor(animFrame/4)%2;
    if (flash) return;
    const x = dino.x, y = dino.y, w = dino.w, h = dino.h;

    // MARIO-STYLE CUTE DINO
    // Body (round, green)
    ctx.fillStyle = '#66bb6a';
    ctx.beginPath(); ctx.ellipse(x+w/2, y+h*0.55, w/2, h*0.45, 0, 0, Math.PI*2); ctx.fill();

    // Belly (light)
    ctx.fillStyle = '#c8e6c9';
    ctx.beginPath(); ctx.ellipse(x+w/2+2, y+h*0.6, w*0.3, h*0.3, 0, 0, Math.PI*2); ctx.fill();

    // Head (bigger, round)
    ctx.fillStyle = '#4caf50';
    ctx.beginPath(); ctx.ellipse(x+w*0.55, y+h*0.25, w*0.38, h*0.28, 0, 0, Math.PI*2); ctx.fill();

    // Spikes on back (cute small ones)
    ctx.fillStyle = '#2e7d32';
    for (let i = 0; i < 4; i++) {
        const sx = x + w*0.3 + i*8;
        const sy = y + h*0.15 + i*3;
        ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx+4, sy-10); ctx.lineTo(sx+8, sy); ctx.fill();
    }

    // Eye (big, cute like Mario characters)
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(x+w*0.65, y+h*0.2, 9, 10, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#212121';
    ctx.beginPath(); ctx.arc(x+w*0.68, y+h*0.22, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x+w*0.7, y+h*0.19, 2, 0, Math.PI*2); ctx.fill();

    // Smile
    ctx.strokeStyle = '#2e7d32'; ctx.lineWidth = 2; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(x+w*0.6, y+h*0.32, 7, 0.1, Math.PI-0.1); ctx.stroke();

    // Legs (animated)
    ctx.fillStyle = '#388e3c';
    if (!dino.jumping) {
        const legOff = Math.sin(dino.runFrame * 5) * 6;
        ctx.beginPath(); ctx.ellipse(x+12, y+h-5+legOff*0.3, 8, 10, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(x+w-12, y+h-5-legOff*0.3, 8, 10, 0, 0, Math.PI*2); ctx.fill();
    } else {
        // Jumping pose
        ctx.beginPath(); ctx.ellipse(x+10, y+h+3, 7, 8, -0.3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(x+w-10, y+h+3, 7, 8, 0.3, 0, Math.PI*2); ctx.fill();
    }

    // Tail
    ctx.fillStyle = '#43a047';
    ctx.beginPath();
    ctx.moveTo(x+3, y+h*0.55);
    ctx.quadraticCurveTo(x-12, y+h*0.45+Math.sin(animFrame*0.08)*4, x-5, y+h*0.65);
    ctx.lineTo(x+5, y+h*0.6);
    ctx.fill();

    // Arms (cute small)
    ctx.fillStyle = '#388e3c';
    ctx.beginPath(); ctx.ellipse(x+w-5, y+h*0.45, 5, 7, 0.3, 0, Math.PI*2); ctx.fill();

    // Dust when running
    if (!dino.jumping && animFrame % 12 === 0) spawnParticles(x + 10, groundY, '#888', 1);
}



function drawHUD() {
    // Lives (hearts)
    for (let i = 0; i < 3; i++) {
        ctx.fillStyle = i < lives ? '#ff1744' : 'rgba(255,255,255,0.2)';
        ctx.font = '22px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText('♥', 15 + i*28, 25);
    }
    // Score
    ctx.fillStyle = '#fff'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Skor: ' + score, W/2, 25);
    // Coins
    ctx.fillStyle = '#ffd600'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText('$ ' + coinCount, W-15, 25);
    // High score
    ctx.fillStyle = '#aaa'; ctx.font = '11px sans-serif';
    ctx.fillText('Best: ' + highScore, W-15, 45);
}

function drawMenu() {
    ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#4caf50'; ctx.font = 'bold 44px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#4caf50'; ctx.shadowBlur = 20;
    ctx.fillText('DINO RUN!', W/2, H/2-100); ctx.shadowBlur = 0;
    ctx.fillStyle = '#aaa'; ctx.font = '16px sans-serif';
    ctx.fillText('Lompat, hindari rintangan, kumpulin koin!', W/2, H/2-55);
    ctx.fillStyle = '#888'; ctx.font = '13px sans-serif';
    ctx.fillText('3 nyawa — lebih santai!', W/2, H/2-30);
    ctx.shadowColor = '#4caf50'; ctx.shadowBlur = 15; ctx.fillStyle = '#4caf50';
    roundRect(W/2-100, H/2-10, 200, 55, 28); ctx.fill(); ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff'; ctx.font = 'bold 22px sans-serif'; ctx.fillText('MAIN!', W/2, H/2+17);
    ctx.fillStyle = '#555'; ctx.font = '12px sans-serif';
    ctx.fillText('Tap/Space = Lompat (2x double jump!)', W/2, H/2+65);
    ctx.fillText('Swipe bawah/S = Merunduk', W/2, H/2+82);
    if (highScore > 0) { ctx.fillStyle = '#ffd600'; ctx.font = 'bold 14px sans-serif'; ctx.fillText('Best: ' + highScore, W/2, H/2+115); }
}

function drawDead() {
    ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ff1744'; ctx.font = 'bold 40px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('GAME OVER!', W/2, H/2-70);
    ctx.fillStyle = '#fff'; ctx.font = '20px sans-serif';
    ctx.fillText('Skor: ' + score + ' | Koin: ' + coinCount, W/2, H/2-25);
    if (score >= highScore && score > 0) { ctx.fillStyle = '#ffd600'; ctx.font = 'bold 16px sans-serif'; ctx.fillText('REKOR BARU!', W/2, H/2+5); }
    ctx.shadowColor = '#4caf50'; ctx.shadowBlur = 15; ctx.fillStyle = '#4caf50';
    roundRect(W/2-100, H/2+25, 200, 55, 28); ctx.fill(); ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px sans-serif'; ctx.fillText('MAIN LAGI', W/2, H/2+53);
}

function roundRect(x,y,w,h,r) { ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); }

// ===== INPUT =====
document.addEventListener('keydown', e => {
    if (e.code==='Space'||e.code==='ArrowUp'||e.key==='w'||e.key==='W') { jump(); e.preventDefault(); }
    if (e.code==='ArrowDown'||e.key==='s'||e.key==='S') { duck(true); e.preventDefault(); }
});
document.addEventListener('keyup', e => { if (e.code==='ArrowDown'||e.key==='s'||e.key==='S') duck(false); });

let touchStartY = 0;
canvas.addEventListener('touchstart', e => {
    touchStartY = e.touches[0].clientY;
    jump(); e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchmove', e => {
    if (e.touches[0].clientY - touchStartY > 30) duck(true);
    e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', e => { duck(false); e.preventDefault(); }, { passive: false });
canvas.addEventListener('click', () => jump());

// ===== GAME LOOP =====
function gameLoop() { requestAnimationFrame(gameLoop); if (state === 'playing') update(); else { animFrame++; draw(); } }
state = 'menu';
dino = { x:100, y:H-GROUND_OFFSET-55, vy:0, w:45, h:55, jumping:false, doubleJumped:false, ducking:false, invincible:0, runFrame:0 };
obstacles=[]; coins=[]; particles=[]; clouds=[]; bgItems=[];
score=0; coinCount=0; speed=BASE_SPEED; distance=0; lives=3;
requestAnimationFrame(gameLoop);
</script>
